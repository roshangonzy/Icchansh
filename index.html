<html lang="en">
<head>

    <style>

            --primary-dark: #2563eb;
            --bg-color: #f8fafc;

            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        /* --- Login Overlay Styles --- */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-card {
            background: var(--surface);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);

            max-width: 400px;
            text-align: center;
        }

        .login-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .login-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: opacity 0.2s;
        }

        .login-btn:hover { opacity: 0.9; }

        .error-msg {
            color: var(--danger);
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
            font-weight: bold;
        }
        
        .troubleshoot-btn {
            margin-top: 25px;
            background: none;
            border: none;
            color: var(--text-light);
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        
        .troubleshoot-btn:hover {
            color: var(--danger);
        }

        /* --- App Styles --- */
        #app-content {
            display: none; /* Hidden until logged in */
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        header h1 {
            color: var(--primary-dark);
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .user-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
            font-size: 1.05rem;
            color: var(--text-light);
            font-weight: 600;
        }

        .logout-btn {
            padding: 5px 12px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .logout-btn:hover { background: #dc2626; }

        .export-all-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background-color: var(--text-main);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;

        .export-all-btn:hover { opacity: 0.9; }

        @media (max-width: 600px) {
            .export-all-btn {
                position: static;
                display: block;
                width: 100%;
                margin-top: 15px;
            }
        }

        /* Level Tabs */
        .level-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .level-btn {
            padding: 10px 30px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--text-light);
            transition: all 0.2s;
        }

        .level-btn#btn-hard.active { background: var(--hard-color); color: white; border-color: var(--hard-color); }

            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;

        .tab-btn {
            padding: 12px 24px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-light);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;

            color: var(--primary);

            padding: 30px;
            border-radius: 12px;

        /* Questions */
        .question-block {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            page-break-inside: avoid;
        }

        .question-block:last-child { border-bottom: none; }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-main);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            background: #f8fafc;

            margin-right: 15px;
            transform: scale(1.3);
            accent-color: var(--primary);
        }

        .option-label.locked { cursor: not-allowed; opacity: 0.85; }
        .option-label.correct-choice { background-color: var(--success-bg); border-color: var(--success); font-weight: 600; }
        .option-label.incorrect-choice { background-color: var(--danger-bg); border-color: var(--danger); opacity: 0.6; text-decoration: line-through; }

        .feedback-box {
            margin-top: 15px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            font-size: 0.95rem;

        .feedback-box.incorrect { background-color: #fef2f2; border: 1px solid var(--danger); color: #991b1b; }

        .logic-section { margin-bottom: 10px; font-weight: 500; }
        .note-section { color: var(--text-main); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* Buttons */
        .btn { display: inline-block; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; text-align: center; color: white; }
        .btn:hover { opacity: 0.9; }
        .btn-primary { background-color: var(--primary); margin-top: 20px; }
        .btn-secondary { background-color: var(--text-light); margin-top: 10px; }
        .btn-dark { background-color: var(--text-main); margin-top: 10px; }
        .btn-danger { background-color: var(--danger); margin-top: 10px; }

        /* Report Styles */
        .report-header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid var(--border); }
        .score-box { background: var(--success-bg); border: 2px solid var(--success); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 30px; }
        .score-box h2 { color: var(--success); font-size: 2.5rem; margin: 10px 0; }
        .score-box p { color: #047857; font-weight: 600; font-size: 1.2rem; }

        .review-item { padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 6px solid; background: #f8fafc; page-break-inside: avoid; }
        .review-item.correct { border-left-color: var(--success); }
        .review-item.incorrect { border-left-color: var(--danger); }
        
        .review-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; margin-bottom: 10px; }
        .badge-correct { background: var(--success-bg); color: var(--success); }
        .badge-incorrect { background: var(--danger-bg); color: var(--danger); }

        .explanation { margin-top: 15px; padding: 15px; background: #e2e8f0; border-radius: 6px; font-size: 0.95rem; line-height: 1.6; }

        @media (min-width: 600px) { .options-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="color: var(--primary-dark); margin-bottom: 5px;">CBSE Physics Quiz</h2>

        <button class="btn btn-primary" onclick="backToQuizzes()">↩ Back to Quizzes</button>
        <button class="btn btn-danger" onclick="retakeQuiz()">↻ Clear Points & Retake This Quiz</button>
    </div>
</div>

<script>

    const validAccounts = {

    // --- QUESTIONS DATASET ---

                title: "Topic 2.1: Introduction (Potential Energy)",
                questions: [
                    { 
                        q: "What type of force is the Coulomb force between two stationary charges?", 
                        o: ["Frictional force", "Viscous force", "Conservative force", "Non-conservative force"], 
                        a: 2, 
                        logic: "The Coulomb force shares the inverse-square distance dependence characteristic of conservative forces like gravity.", 
                        note: "In introductory mechanics, the concepts of spring and gravitational forces were established as classical conservative forces. When an external agency performs work against these forces, the energy is not lost but stored securely as potential energy. The electrostatic Coulomb force behaves in the exact same manner due to its inverse-square mathematical relationship. Therefore, any mechanical work executed against a static electric field is perfectly conserved within the charge system. If you remove the external constraint, the electric field immediately converts this stored potential energy back into kinetic energy. This flawless conservation mechanism is what allows physicists to mathematically define electrostatic potential energy."

                    { 
                        q: "What is the most crucial characteristic of the work done by an electrostatic field in moving a charge?",

                        a: 1, 
                        logic: "The defining hallmark of any conservative force is that the work done relies solely on the initial and final positions.", 
                        note: "When moving a test charge through an electrostatic field, the route you choose to take is completely irrelevant to the energy expended. You could move the charge in a straight line or along a highly complex, winding trajectory between two points. In both scenarios, the total work done against the electrostatic field will be mathematically identical. Fundamental physics explicitly highlights that this path-independence is the primary characteristic of a conservative force. If the work done actually depended on the specific path, the entire concept of assigning a fixed potential energy to a point would collapse. This vital property is rigorously proven using Coulomb's inverse-square law."
                    },
                    { 
                        q: "When an external force brings a test charge from point R to P against a repulsive electric field, how is the work stored?", 
                        o: ["As kinetic energy", "As thermal energy dissipated to the environment", "Fully as potential energy of the charge", "As electromagnetic radiation"], 
                        a: 2, 
                        logic: "Work done against a conservative repulsive force translates directly and entirely into stored potential energy.", 
                        note: "Imagine physically pushing a heavy box against a stiff spring to compress it inward. The mechanical effort you exert is captured and stored within the metallic coils as elastic potential energy. The exact same principle applies when you push a positive test charge toward another repulsive positive source charge. You must exert an external force to overcome their mutual electrostatic repulsion and close the distance. As you perform this mechanical work, the energy does not simply vanish into the surroundings. It gets completely and efficiently stored within the system as electrostatic potential energy."
                    },
                    { 
                        q: "Where is the most mathematically convenient location to choose the electrostatic potential energy to be exactly zero?", 
                        o: ["At the physical origin of the coordinate system", "At the exact midpoint between any two charges", "At an infinite distance away", "Inside a hollow metallic conductor"], 
                        a: 2, 
                        logic: "Setting the baseline potential energy to zero at infinity greatly simplifies the mathematical calculation of potential differences.", 
                        note: "In physics, the absolute value of potential energy does not carry any inherent physical meaning on its own. Only the measurable difference in potential energy between two distinct locations has physical significance. Because of this relativity, physicists have the complete mathematical freedom to choose any arbitrary point as the 'zero' reference level. To make calculations elegant and straightforward, the universally accepted convention is to set the electrostatic potential energy to zero at infinity. At an infinite distance, the electrostatic force between two charges is effectively zero, making it a highly logical baseline. By adopting this standard convention, the potential energy at any specific point simply equals the work done in bringing the charge from infinity."
                    },
                    { 
                        q: "To measure potential energy accurately, the external force applied on the test charge must perfectly counter the repulsive electric force. What does this achieve?", 
                        o: ["It accelerates the charge to the speed of light.", "It ensures there is absolutely no net force or acceleration.", "It creates a uniform magnetic field.", "It causes the charge to emit radiation."], 
                        a: 1, 
                        logic: "Balancing the forces ensures the particle does not accelerate, preventing work from being lost as kinetic energy.", 
                        note: "When calculating electrostatic potential energy, the goal is to measure strictly the work done against the electric field itself. If the external pushing force is even slightly greater than the repulsive electric force, a net force is created. According to Newton's laws, this net force will cause the test charge to accelerate and gain velocity. This acceleration means that a portion of the work done by the external agency is being converted into kinetic energy instead of being stored. To completely prevent this, an external force must be applied that is exactly equal and opposite to the electric force. This guarantees the charge moves with an infinitesimally slow, constant speed."
                    },
                    { 
                        q: "If you remove the external force holding a test charge $q$ near a repulsive source charge, what physically occurs?", 
                        o: ["The charge remains completely stationary in its high-energy state.", "The electric force takes over, giving the charge kinetic energy.", "The charge instantly loses all of its stored potential energy.", "The charge slowly drifts back to infinity without accelerating."], 
                        a: 1, 
                        logic: "Removing the external constraint allows the internal repulsive force to convert the stored potential energy directly into motion.", 
                        note: "Bringing two positively charged particles together requires significant external work because they naturally repel one another. This applied work successfully builds up a massive reserve of electrostatic potential energy within the system. As long as the external agency continues to hold the charge firmly in place, the system remains in a forced equilibrium. However, the very millisecond that external force is removed, the repulsive electrostatic force takes complete control. This internal force aggressively accelerates the test charge away from the source charge. During this rapid outward movement, the system's stored potential energy decreases while the charge's kinetic energy increases by an exactly equal amount."
                    },
                    { 
                        q: "Which two mechanical forces are frequently used as classical examples to explain the core concept of conservative forces?", 
                        o: ["Nuclear and Frictional forces", "Magnetic and Viscous forces", "Spring and Gravitational forces", "Tension and Normal forces"], 
                        a: 2, 
                        logic: "Introductory physics uses familiar mechanical concepts like spring and gravitational forces to introduce abstract electrostatic fields.", 
                        note: "To help conceptualize the highly abstract nature of electrostatic potential, introductory physics wisely relies on familiar concepts from classical mechanics. It is important to recall how mechanical work is safely stored when stretching a physical spring or lifting a heavy mass against Earth's gravity. Both the spring force and the gravitational force are strictly conservative, meaning energy is always conserved and the path taken is irrelevant. The Coulomb force behaves in the exact same reliable manner. The primary mathematical similarity highlighted is the inverse-square dependence found in both Newton's law of gravitation and Coulomb's law. This clever comparison bridges the cognitive gap between mechanical potential energy and electrostatic potential energy."
                    },
                    { 
                        q: "What equation correctly represents the formal definition of potential energy difference ($\\Delta U$) between points R and P?", 
                        o: ["$\\Delta U = U_P - U_R = W_{RP}$", "$\\Delta U = U_R - U_P = -W_{RP}$", "$\\Delta U = U_P \\times U_R$", "$\\Delta U = 0$"], 
                        a: 0, 
                        logic: "The potential energy difference between two points is exactly equal to the external mechanical work done to move the charge between them.", 
                        note: "In the realm of electrostatic theory, mechanical work and potential energy are inextricably and mathematically linked. The potential energy difference between a final destination point P and an initial starting point R is universally denoted as $\\Delta U$. By strict definition, this difference is equal to the mechanical work ($W_{RP}$) required by an external force to move the charge from R to P. Crucially, this movement must be executed without accelerating the charge in any way. Physics formalizes this fundamental relationship with the elegant equation $\\Delta U = U_P - U_R = W_{RP}$. This simple yet powerful equation serves as the absolute cornerstone of electrostatics."
                    },
                    { 
                        q: "Why do rigorous theoretical models assume that the test charge $q$ is extremely small when defining electrostatic potential energy?", 
                        o: ["To make the calculus integration much easier to perform.", "So it does not physically disturb the original source charge configuration.", "Because large charges strangely do not experience the Coulomb force.", "To prevent it from colliding with surrounding atomic structures."], 
                        a: 1, 
                        logic: "A massive test charge would exert its own significant force, causing the source charges to physically shift and ruining the measurement.", 
                        note: "The entire mathematical premise of measuring a static electric field heavily relies on the source charges remaining perfectly still. If we attempt to use a test charge that is physically too large, it will exert a massive repulsive or attractive force back onto the source. This strong interaction would invariably cause the original source charges to move or scatter from their positions. Such movement would dynamically alter the very electric field we are attempting to carefully map and measure. To completely avoid this paradox, we theoretically assume the test charge is infinitesimally small. Alternatively, rigorous models dictate we must assume the source charges are firmly held in place by extremely powerful external forces."
                    },
                    { 
                        q: "What happens to the overall sum of kinetic and potential energies when a charge moves completely freely within an electrostatic field?", 
                        o: ["It continuously decreases due to energy lost as heat.", "It continuously increases as the charge accelerates.", "It remains strictly and perfectly conserved.", "It fluctuates wildly depending on the charge's mass."], 
                        a: 2, 
                        logic: "Because the electrostatic force is purely conservative, the total mechanical energy of the isolated system must remain flawlessly constant.", 
                        note: "A defining feature of any conservative force field is its strict adherence to the universal law of conservation of mechanical energy. When a charge moves freely under the sole influence of an electrostatic field, there are no external non-conservative forces like friction draining the system. If the charge moves in the direction of the electric force, it accelerates rapidly, meaning its kinetic energy is actively rising. Simultaneously, it moves into a region of lower potential, losing an exactly equal amount of electrostatic potential energy. Thus, at any microscopic point during its journey, the combined sum of its kinetic and potential energies remains perfectly constant. The energy merely shape-shifts between motion and stored potential."
                    }
                ]
            },
            ch2: {
                title: "Topic 2.2: Electrostatic Potential",
                questions: [
                    { 
                        q: "What is the primary mathematical reason we divide the total external work done by the amount of test charge $q$?", 
                        o: ["To convert the energy into Joules.", "To make the resulting quantity completely independent of the test charge $q$.", "To calculate the kinetic energy of the charge.", "To ensure the potential is always a positive number."], 
                        a: 1, 
                        logic: "Dividing by $q$ isolates the effect of the source charges, creating a measurement characteristic of the electric field itself.", 
                        note: "The concept of electrostatic potential requires normalizing the mechanical work done against the field. By dividing the total external work by the exact magnitude of the moving test charge $q$, we elegantly remove the test charge from the final equation. This mathematical division leaves a pure quantity that depends absolutely exclusively on the source charges creating the ambient field. Therefore, the resulting electrostatic potential is a distinct, universal characteristic of the electric field itself. This brilliant abstraction allows physicists to mathematically map the energy landscape of an entire area without needing to specify what specific object is moving through it. The potential tells us precisely how much work would be required per unit of charge, making all subsequent calculations universal."
                    },
                    { 
                        q: "Which of the following equations correctly defines the electrostatic potential difference ($V_P - V_R$) between points R and P?", 
                        o: ["$V_P - V_R = q(U_P - U_R)$", "$V_P - V_R = (U_P - U_R) / q$", "$V_P - V_R = U_P \\times U_R$", "$V_P - V_R = 0$"], 
                        a: 1, 
                        logic: "Potential difference is strictly defined as the change in potential energy divided by the magnitude of the test charge.", 
                        note: "In electrostatic theory, potential and potential energy are intimately related but distinctly different physical concepts. Potential energy ($U$) measures the total stored energy of a specific charge configuration. Electrostatic potential ($V$), however, measures the amount of that stored energy per unit of charge. To mathematically transition from energy to potential, electrostatic theory defines the potential difference as the potential energy difference divided by $q$. The equation $V_P - V_R = (U_P - U_R) / q$ perfectly encapsulates this fundamental definition. This guarantees that the potential difference reflects the environment's intrinsic properties, entirely independent of the specific test charge being examined."
                    },
                    { 
                        q: "According to universally accepted scientific convention, where is the electrostatic potential chosen to be exactly zero?",

    // Feature to forcefully wipe old/broken local storage
    function clearAppData() {
        if (confirm("Are you sure you want to completely clear the local data? This will erase all scores and answers for all accounts on this device.")) {
            localStorage.clear();
            alert("Local storage wiped successfully. Reloading the app...");
            location.reload(true);
        }
    }

    // --- LOGIN / LOGOUT LOGIC ---
    function handleLogin() {
        const userField = document.getElementById('username').value.trim().toLowerCase();
        const passField = document.getElementById('password').value.trim();

        if (validAccounts[userField] && validAccounts[userField] === passField) {
            loggedInUser = userField;
            localStorage.setItem('cbsePhysicsUser', loggedInUser);
            document.getElementById('login-error').style.display = 'none';
            initApp();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    function handleEnter(e) {
        if (e.key === 'Enter') {
            handleLogin();
        }
    }

    function handleLogout() {
        localStorage.removeItem('cbsePhysicsUser');
        location.reload();
    }

    // --- QUIZ FUNCTIONS ---
    function setLevel(level) {
        currentLevel = level;
        
        // Update level buttons
        document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${level}`).classList.add('active');

        // Reload current chapter with new level
        loadQuiz(currentChapter);
    }

    function updateTabScores() {
        const c1 = quizScores[currentLevel]['ch1'];
        const tot1 = quizData[currentLevel]['ch1'].questions.length;
        const badgeElement1 = document.getElementById('badge-ch1');
        if (badgeElement1) {
            badgeElement1.innerHTML = c1 !== null ? `<span class="score-badge">${c1}/${tot1}</span>` : '';
        }

        const c2 = quizScores[currentLevel]['ch2'];
        const tot2 = quizData[currentLevel]['ch2'].questions.length;
        const badgeElement2 = document.getElementById('badge-ch2');
        if (badgeElement2) {
            badgeElement2.innerHTML = c2 !== null ? `<span class="score-badge">${c2}/${tot2}</span>` : '';
        }

        const c3 = quizScores[currentLevel]['ch3'];
        const tot3 = quizData[currentLevel]['ch3'].questions.length;
        const badgeElement3 = document.getElementById('badge-ch3');
        if (badgeElement3) {
            badgeElement3.innerHTML = c3 !== null ? `<span class="score-badge">${c3}/${tot3}</span>` : '';
        }
    }

    function loadQuiz(chapterId) {
        currentChapter = chapterId;
        
        // Update Chapter Tabs
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${chapterId}`).classList.add('active');
        
        updateTabScores();

        // Show quiz view, hide report view
        document.getElementById('quiz-view').classList.add('active');
        document.getElementById('report-view').classList.remove('active');

        const activeData = quizData[currentLevel][chapterId];

        // Set Title
        document.getElementById('quiz-title').innerText = activeData.title;

        // Render Questions
        const container = document.getElementById('questions-container');
        container.innerHTML = '';

        activeData.questions.forEach((qObj, index) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question-block';
            
            // Check state to see if this was already answered previously
            const answeredOption = userAnswers[currentLevel][chapterId][index];
            const isAnswered = answeredOption !== undefined;
            
            let optionsHTML = '';
            qObj.o.forEach((opt, optIndex) => {
                const isChecked = isAnswered && answeredOption === optIndex;
                let optionClasses = 'option-label ';
                
                // If the question is answered, apply styling classes
                if (isAnswered) {
                    optionClasses += 'locked ';
                    if (optIndex === qObj.a) {
                        optionClasses += 'correct-choice ';
                    } else if (isChecked) {
                        optionClasses += 'incorrect-choice ';
                    }
                }

                optionsHTML += `
                    <label class="${optionClasses}" id="label-${currentLevel}-${chapterId}-${index}-${optIndex}">
                        <input type="radio" name="q-${currentLevel}-${chapterId}-${index}" value="${optIndex}" 
                        ${isChecked ? 'checked' : ''}
                        ${isAnswered ? 'disabled' : ''}
                        onchange="selectAnswer('${chapterId}', ${index}, ${optIndex})">
                        ${opt}
                    </label>
                `;
            });

            // Set up the immediate feedback box if already answered
            let feedbackHTML = '';
            if (isAnswered) {
                const isCorrect = answeredOption === qObj.a;
                feedbackHTML = `
                    <div id="feedback-${currentLevel}-${chapterId}-${index}" class="feedback-box ${isCorrect ? 'correct' : 'incorrect'}" style="display:block;">
                        <strong class="title">${isCorrect ? '✓ Correct!' : '✗ Incorrect.'}</strong>
                        <div class="logic-section">Logic: ${qObj.logic}</div>
                        <div class="note-section"><strong>Learning Note:</strong> ${qObj.note}</div>
                    </div>
                `;
            } else {
                feedbackHTML = `<div id="feedback-${currentLevel}-${chapterId}-${index}" class="feedback-box"></div>`;
            }

            qDiv.innerHTML = `
                <div class="question-text">${index + 1}. ${qObj.q}</div>
                <div class="options-grid">${optionsHTML}</div>
                ${feedbackHTML}
            `;
            container.appendChild(qDiv);
        });

        // Setup Submit/View Report Button Logic
        const submitContainer = document.getElementById('submit-container');
        const totalQ = activeData.questions.length;

        if (quizScores[currentLevel][chapterId] !== null) {
            submitContainer.innerHTML = `<button class="btn btn-primary" onclick="showReport()">📊 View Report (Score: ${quizScores[currentLevel][chapterId]}/${totalQ})</button>`;
        } else {
            submitContainer.innerHTML = `<button class="btn btn-primary" onclick="submitQuiz()">Submit & Get Final Report</button>`;
        }
        
        window.scrollTo({ top: 0, behavior: 'smooth' });

        // Typeset MathJax for newly injected elements
        if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
            MathJax.typesetPromise([container, document.getElementById('quiz-title')]).catch(err => console.log(err));
        }
    }

    // Handles user selecting an answer visually and in state
    window.selectAnswer = function(chapterId, qIndex, optIndex) {
        // LOCK IN ANSWER: Check if already answered
        if (userAnswers[currentLevel][chapterId][qIndex] !== undefined) return;

        // Save answer to state
        userAnswers[currentLevel][chapterId][qIndex] = optIndex;
        saveState(); // Update local storage
        
        const qObj = quizData[currentLevel][chapterId].questions[qIndex];
        const isCorrect = optIndex === qObj.a;
        
        // Visual update - Lock the options and show correct/incorrect colors
        for(let i=0; i<4; i++) {
            const label = document.getElementById(`label-${currentLevel}-${chapterId}-${qIndex}-${i}`);
            const input = label.querySelector('input');
            
            if (label && input) {
                label.classList.add('locked');
                input.disabled = true; // Disable all inputs for this question
                
                if (i === qObj.a) {
                    label.classList.add('correct-choice'); // Highlight the real answer
                } else if (i === optIndex) {
                    label.classList.add('incorrect-choice'); // Strike-through wrong guess
                }
            }
        }
        
        // Show immediate feedback note with justification
        const feedbackBox = document.getElementById(`feedback-${currentLevel}-${chapterId}-${qIndex}`);
        feedbackBox.className = `feedback-box ${isCorrect ? 'correct' : 'incorrect'}`;
        feedbackBox.innerHTML = `
            <strong class="title">${isCorrect ? '✓ Correct!' : '✗ Incorrect.'}</strong>
            <div class="logic-section">Logic: ${qObj.logic}</div>
            <div class="note-section"><strong>Learning Note:</strong> ${qObj.note}</div>
        `;
        feedbackBox.style.display = 'block';

        if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
            MathJax.typesetPromise([feedbackBox]).catch(err => console.log(err));
        }
    }

    window.submitQuiz = function() {
        const activeData = quizData[currentLevel][currentChapter];
        const totalQ = activeData.questions.length;
        const answeredQ = Object.keys(userAnswers[currentLevel][currentChapter]).length;

        if (answeredQ < totalQ) {
            const confirmSubmit = confirm(`You have only answered ${answeredQ} out of ${totalQ} questions. Unanswered questions will be marked wrong. Do you want to submit anyway?`);
            if(!confirmSubmit) return;
        }

        // Calculate and save score persistently
        let score = 0;
        activeData.questions.forEach((qObj, index) => {
            if (userAnswers[currentLevel][currentChapter][index] === qObj.a) {
                score++;
            }
        });
        
        quizScores[currentLevel][currentChapter] = score;
        saveState(); // Update local storage
        
        updateTabScores();
        showReport();
    }

    window.showReport = function() {
        const data = quizData[currentLevel][currentChapter];
        const score = quizScores[currentLevel][currentChapter];
        const totalQ = data.questions.length;

        // Hide quiz, show report
        document.getElementById('quiz-view').classList.remove('active');
        document.getElementById('report-view').classList.add('active');
        
        const reportContainer = document.getElementById('printable-report');
        let reviewHTML = '';

        data.questions.forEach((qObj, index) => {
            const userAns = userAnswers[currentLevel][currentChapter][index];
            const isAnswered = userAns !== undefined;
            const isCorrect = isAnswered && (userAns === qObj.a);

            const badgeClass = isCorrect ? 'badge-correct' : 'badge-incorrect';
            const badgeText = isCorrect ? '✓ Correct' : '✗ Incorrect';
            const userAnswerText = isAnswered ? qObj.o[userAns] : 'Not Answered';

            reviewHTML += `
                <div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                    <span class="review-badge ${badgeClass}">${badgeText}</span>
                    <div class="question-text">${index + 1}. ${qObj.q}</div>
                    
                    <p style="margin-bottom: 5px;"><strong>Your Answer:</strong> 
                        <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnswerText}</span>
                    </p>
                    
                    ${!isCorrect ? `<p style="margin-bottom: 5px;"><strong>Correct Answer:</strong> <span style="color: var(--success); font-weight: bold;">${qObj.o[qObj.a]}</span></p>` : ''}
                    
                    <div class="explanation">
                        <div class="logic-section">Logic: ${qObj.logic}</div>
                        <div class="note-section"><strong>Learning Note:</strong> ${qObj.note}</div>
                    </div>
                </div>
            `;
        });

        const percentage = ((score / totalQ) * 100).toFixed(0);
        const dateString = new Date().toLocaleDateString();
        const displayName = loggedInUser.charAt(0).toUpperCase() + loggedInUser.slice(1);

        reportContainer.innerHTML = `
            <div class="report-header">
                <h2>Performance Report</h2>
                <h3 style="color: var(--text-light);">${data.title}</h3>
                <p>Student: <strong>${displayName}</strong> | Generated on: ${dateString}</p>
            </div>
            
            <div class="score-box">
                <p>TOTAL MARKS OBTAINED</p>
                <h2>${score} / ${totalQ}</h2>
                <p>Accuracy: ${percentage}%</p>
            </div>

            <h3 style="margin-bottom: 20px; text-align: center; color: var(--primary-dark);">Detailed Review</h3>
            ${reviewHTML}
        `;
        
        window.scrollTo({ top: 0, behavior: 'smooth' });

        if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
            MathJax.typesetPromise([reportContainer]).catch(err => console.log(err));
        }
    }

    window.backToQuizzes = function() {
        // Navigate back WITHOUT clearing answers
        loadQuiz(currentChapter);
    }
    
    window.retakeQuiz = function() {
        // Explicitly clear answers for retake
        const confirmRetake = confirm(`Are you sure you want to erase your score and retake this quiz?`);
        if(!confirmRetake) return;
        
        userAnswers[currentLevel][currentChapter] = {};
        quizScores[currentLevel][currentChapter] = null;
        saveState(); // Update local storage
        
        loadQuiz(currentChapter);
    }

    window.exportPDF = function() {
        const element = document.getElementById('printable-report');
        const filename = `Physics_Report_${loggedInUser}_${currentLevel}_${currentChapter}.pdf`;
        
        // Configure PDF options
        const opt = {
            margin:       [15, 15, 15, 15],
            filename:     filename,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] }
        };

        // Generate and save
        html2pdf().set(opt).from(element).save();
    }

    window.exportAllScores = function() {
        // Create a temporary container for the master report
        const tempDiv = document.createElement('div');
        tempDiv.style.padding = '30px';
        tempDiv.style.fontFamily = 'sans-serif';
        tempDiv.style.color = '#0f172a';
        
        // Formatter perfectly restricted to Marks & Percentage only.
        const getScoreText = (val, level, ch) => {
            if (val !== null) {
                const total = quizData[level][ch].questions.length;
                if(total === 0) return '<span style="color: #64748b;">No Questions Available</span>';
                const percentage = ((val / total) * 100).toFixed(0);
                return `<strong style="color: #10b981;">Marks: ${val} / ${total} &nbsp;&nbsp;|&nbsp;&nbsp; Percentage: ${percentage}%</strong>`;
            }
            return '<span style="color: #64748b;">Not Attempted</span>';
        };
        
        const displayName = loggedInUser.charAt(0).toUpperCase() + loggedInUser.slice(1);

        tempDiv.innerHTML = `
            <div style="text-align: center; margin-bottom: 40px;">
                <h1 style="color: #2563eb; font-size: 28px;">CBSE Physics - Score Report</h1>
                <p style="font-size: 16px; color: #64748b;">Student: <strong>${displayName}</strong> | Class 12 | Generated on: ${new Date().toLocaleDateString()}</p>
            </div>
            
            <div style="margin-bottom: 30px;">
                <h2 style="background: #10b981; color: white; padding: 10px; border-radius: 6px;">Easy Level Scores</h2>
                <ul style="list-style: none; padding: 0; font-size: 18px; line-height: 2;">
                    <li style="border-bottom: 1px solid #e2e8f0; padding: 10px 0;"><strong>Topic 2.1: Introduction</strong> <br> <span style="display: block; margin-top: 5px;">${getScoreText(quizScores.easy.ch1, 'easy', 'ch1')}</span></li>
                    <li style="border-bottom: 1px solid #e2e8f0; padding: 10px 0;"><strong>Topic 2.2: Electrostatic Potential</strong> <br> <span style="display: block; margin-top: 5px;">${getScoreText(quizScores.easy.ch2, 'easy', 'ch2')}</span></li>
                    <li style="border-bottom: 1px solid #e2e8f0; padding: 10px 0;"><strong>Topic 2.3: Point Charge</strong> <br> <span style="display: block; margin-top: 5px;">${getScoreText(quizScores.easy.ch3, 'easy', 'ch3')}</span></li>
                </ul>
            </div>

            <div style="margin-bottom: 30px;">
                <h2 style="background: #f59e0b; color: white; padding: 10px; border-radius: 6px;">Medium Level Scores</h2>
                <ul style="list-style: none; padding: 0; font-size: 18px; line-height: 2;">
                    <li style="border-bottom: 1px solid #e2e8f0; padding: 10px 0;"><strong>Topic 2.1: Introduction</strong> <br> <span style="display: block; margin-top: 5px;">${getScoreText(quizScores.medium.ch1, 'medium', 'ch1')}</span></li>
                    <li style="border-bottom: 1px solid #e2e8f0; padding: 10px 0;"><strong>Topic 2.2: Electrostatic Potential</strong> <br> <span style="display: block; margin-top: 5px;">${getScoreText(quizScores.medium.ch2, 'medium', 'ch2')}</span></li>
                    <li style="border-bottom: 1px solid #e2e8f0; padding: 10px 0;"><strong>Topic 2.3: Point Charge</strong> <br> <span style="display: block; margin-top: 5px;">${getScoreText(quizScores.medium.ch3, 'medium', 'ch3')}</span></li>
                </ul>
            </div>
            
            <div style="margin-bottom: 30px;">
                <h2 style="background: #ef4444; color: white; padding: 10px; border-radius: 6px;">Hard Level Scores</h2>
                <ul style="list-style: none; padding: 0; font-size: 18px; line-height: 2;">
                    <li style="border-bottom: 1px solid #e2e8f0; padding: 10px 0;"><strong>Topic 2.1: Introduction</strong> <br> <span style="display: block; margin-top: 5px;">${getScoreText(quizScores.hard.ch1, 'hard', 'ch1')}</span></li>
                    <li style="border-bottom: 1px solid #e2e8f0; padding: 10px 0;"><strong>Topic 2.2: Electrostatic Potential</strong> <br> <span style="display: block; margin-top: 5px;">${getScoreText(quizScores.hard.ch2, 'hard', 'ch2')}</span></li>
                    <li style="border-bottom: 1px solid #e2e8f0; padding: 10px 0;"><strong>Topic 2.3: Point Charge</strong> <br> <span style="display: block; margin-top: 5px;">${getScoreText(quizScores.hard.ch3, 'hard', 'ch3')}</span></li>
                </ul>
            </div>
        `;

        const opt = {
            margin:       15,
            filename:     `Physics_Master_Score_Report_${loggedInUser}.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2 },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
            MathJax.typesetPromise([tempDiv]).then(() => html2pdf().set(opt).from(tempDiv).save());
        } else {
            html2pdf().set(opt).from(tempDiv).save();
        }
    }

    // Start App verification
    window.onload = initApp;
</script>

</body>
</html>
