    <style>
        /* --- Minimalist Design System --- */
        :root {
            --bg-main: #FAFAFA; --bg-surface: #FFFFFF; --sidebar-bg: #F4F4F5;
            --text-main: #09090B; --text-muted: #71717A;
            --border: #E4E4E7; --border-hover: #D4D4D8;
            --primary: #18181B; --primary-hover: #27272A;
            --success: #10B981; --success-bg: #ECFDF5;
            --danger: #EF4444; --danger-bg: #FEF2F2;
            --warning: #F59E0B; --warning-bg: #FEF3C7;
            --radius: 8px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; font-size: 15px; }

        /* Buttons */
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 18px; border-radius: var(--radius); font-weight: 500; font-size: 0.95rem; cursor: pointer; border: 1px solid transparent; transition: 0.2s; text-decoration: none; }
        .btn-solid { background: var(--primary); color: white; }
        .btn-solid:hover { background: var(--primary-hover); }
        .btn-outline { background: var(--bg-surface); border-color: var(--border); color: var(--text-main); }
        .btn-outline:hover { background: var(--bg-main); border-color: var(--text-muted); }
        .btn-danger { background: var(--bg-surface); border-color: var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger-bg); }

        /* Login View */
        #login-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-surface); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { width: 100%; max-width: 340px; text-align: center; }
        .login-box h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 8px; }
        .login-box p { color: var(--text-muted); margin-bottom: 24px; font-size: 0.95rem; }
        .input-field { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.95rem; background: var(--bg-main); outline: none; transition: 0.2s; }
        .input-field:focus { border-color: var(--primary); background: var(--bg-surface); }
        .error-text { color: var(--danger); font-size: 0.85rem; margin-top: 12px; display: none; font-weight: 500; }

        /* Main Layout */
        #app-view { display: none; width: 100%; height: 100%; display: flex; }
        
        /* Deep Hierarchy Sidebar */
        .sidebar { width: 340px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: margin-left 0.3s ease; }
        .sidebar.collapsed { margin-left: -340px; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .student-name { font-weight: 700; font-size: 1.1rem; }
        .btn-text { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: 0.2s; }
        .btn-text:hover { color: var(--danger); }
        
        .directory { flex: 1; overflow-y: auto; padding: 16px 12px; }
        
        /* Tree Levels */
        .dir-subject { font-size: 0.75rem; text-transform: uppercase; font-weight: 700; color: var(--primary); letter-spacing: 0.05em; padding: 8px; margin-top: 16px; border-bottom: 1px solid var(--border); }
        .dir-part { font-size: 0.7rem; text-transform: uppercase; font-weight: 600; color: var(--text-muted); letter-spacing: 0.05em; padding: 8px; margin-top: 4px; }
        
        .dir-chapter { padding: 8px; font-weight: 600; cursor: pointer; border-radius: var(--radius); display: flex; align-items: center; gap: 8px; font-size: 0.95rem; color: var(--text-main); }
        .dir-chapter:hover { background: var(--border); }
        
        .dir-topic { padding: 6px 8px 6px 28px; font-weight: 500; cursor: pointer; font-size: 0.85rem; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
        .dir-topic:hover { color: var(--text-main); }
        
        .dir-subtopic { padding: 4px 8px 4px 44px; font-weight: 500; cursor: pointer; font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
        .dir-subtopic:hover { color: var(--text-main); }
        
        .dir-item { padding: 6px 8px 6px 60px; font-size: 0.85rem; color: var(--text-muted); cursor: pointer; border-radius: var(--radius); display: flex; justify-content: space-between; align-items: center; margin: 2px 0;}
        .dir-item:hover { color: var(--text-main); background: var(--border-hover); }
        .dir-item.active { background: var(--bg-surface); color: var(--text-main); font-weight: 600; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
        
        .tree-group { display: none; }
        .tree-group.open { display: block; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); border: 1px solid var(--bg-main); }
        .status-dot.done { background: var(--success); }

        /* Content Area */
        .content-area { flex: 1; background: var(--bg-surface); overflow-y: auto; display: flex; flex-direction: column; }
        .topbar { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg-surface); position: sticky; top: 0; z-index: 10; }
        .hamburger { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); padding: 4px; border-radius: var(--radius); transition: 0.2s;}
        .hamburger:hover { background: var(--bg-main); color: var(--text-main); }
        .breadcrumb { font-size: 0.9rem; color: var(--text-muted); font-weight: 500; }
        
        .content-inner { flex: 1; max-width: 800px; margin: 0 auto; padding: 40px; width: 100%; animation: fadeIn 0.3s ease; }
        
        /* Views */
        #view-dashboard, #view-quiz, #view-report { display: none; }
        
        .page-header { margin-bottom: 40px; border-bottom: 2px solid var(--bg-main); padding-bottom: 20px;}
        .page-header h1 { font-size: 2.25rem; font-weight: 700; margin-bottom: 8px; }
        .page-header p { color: var(--text-muted); font-size: 1.1rem; }

        /* Quiz UI */
        .quiz-type { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; display: block; }
        .quiz-title { font-size: 1.75rem; font-weight: 700; line-height: 1.2; margin-bottom: 8px; }
        .q-block { margin-bottom: 48px; }
        .q-text { font-size: 1.1rem; font-weight: 500; margin-bottom: 20px; line-height: 1.6; }
        .opt-list { display: flex; flex-direction: column; gap: 10px; }
        .opt-label { display: flex; align-items: flex-start; padding: 16px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: 0.2s; background: var(--bg-main); }
        .opt-label:hover:not(.locked) { border-color: var(--text-muted); background: var(--bg-surface); }
        .opt-label input { margin-top: 4px; margin-right: 12px; accent-color: var(--primary); transform: scale(1.2); }
        .opt-label.locked { cursor: default; opacity: 0.8; }
        .opt-label.selected-classic { border-color: var(--primary); background: var(--bg-surface); box-shadow: 0 0 0 1px var(--primary); }
        .opt-label.correct { border-color: var(--success); background: var(--success-bg); color: #065F46; }
        .opt-label.incorrect { border-color: var(--danger); background: var(--danger-bg); text-decoration: line-through; opacity: 0.6; }

        /* Feedback Box */
        .feedback-box { margin-top: 20px; padding: 20px; border-radius: var(--radius); border-left: 4px solid; display: none; line-height: 1.6; }
        .feedback-box.is-correct { background: var(--bg-main); border-left-color: var(--success); }
        .feedback-box.is-wrong { background: var(--bg-main); border-left-color: var(--danger); }
        .fb-title { font-weight: 700; margin-bottom: 12px; font-size: 1.1rem;}
        .fb-section { margin-top: 16px; }
        .fb-section span { font-weight: 700; font-size: 0.8rem; text-transform: uppercase; color: var(--text-main); margin-bottom: 4px; display: block;}

        /* Report UI */
        .report-summary { padding: 40px; border: 2px solid var(--border); border-radius: var(--radius); background: var(--bg-main); text-align: center; margin-bottom: 48px; }
        .report-score { font-size: 4rem; font-weight: 700; margin: 10px 0; line-height: 1; }
        .action-bar { display: flex; gap: 16px; margin-top: 40px; padding-top: 32px; border-top: 1px solid var(--border); }
        .empty-state { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

    <div id="login-view">
        <div class="login-box">
            <h1>Student Portal</h1>

            <input type="text" id="username" class="input-field" placeholder="Username (icchansh)" onkeypress="if(event.key==='Enter') login()">

    <script>
        let loggedInUser = null;
        let currentItem = null;
        let userAnswers = {}; 
        let quizScores = {};  
        let mappedCurriculum = [];

        const storage = {
            get: (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } },
            set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
        };

        function getStorageKey() { return `lms_v4_${loggedInUser}`; }
        function saveState() { storage.set(getStorageKey(), { answers: userAnswers, scores: quizScores }); renderDirectory(); }

        function login() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            if (validAccounts[user] && validAccounts[user] === pass) {
                loggedInUser = user;
                document.getElementById('login-error').style.display = 'none';
                
                const saved = storage.get(getStorageKey());
                userAnswers = saved ? saved.answers : {};
                quizScores = saved ? saved.scores : {};

                document.getElementById('login-view').style.display = 'none';
                document.getElementById('app-view').style.display = 'flex';
                document.getElementById('student-name-display').innerText = user.charAt(0).toUpperCase() + user.slice(1);
                
                buildCurriculum();
                renderDirectory();
                document.getElementById('view-dashboard').style.display = 'flex';
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function logout() {
            loggedInUser = null;
            document.getElementById('app-view').style.display = 'none';
            document.getElementById('login-view').style.display = 'flex';
            document.getElementById('username').value = ''; document.getElementById('password').value = '';
            document.getElementById('view-dashboard').style.display = 'none';
            document.getElementById('view-quiz').style.display = 'none';
            document.getElementById('view-report').style.display = 'none';
        }

        // --- MAP PLUGINS TO SYLLABUS ---
        function buildCurriculum() {
            mappedCurriculum = JSON.parse(JSON.stringify(SYLLABUS)); // Deep copy template
            
            const modules = window.LMS_PORTAL.filter(m => m.targetUser === loggedInUser || m.targetUser === 'all');
            
            modules.forEach(mod => {
                // Find matching Subject -> Part -> Chapter -> Topic -> Subtopic
                const sub = mappedCurriculum.find(s => s.subject === mod.subject);
                if(!sub) return;
                const part = sub.parts.find(p => p.part === mod.part);
                if(!part) return;
                const ch = part.chapters.find(c => c.title === mod.chapter);
                if(!ch) return;
                
                if (mod.topic) {
                    const top = ch.topics.find(t => t.title === mod.topic);
                    if(top) {
                        if(mod.subtopic) {
                            const subT = top.subtopics.find(st => st.title === mod.subtopic);
                            if(subT) { if(!subT.items) subT.items = []; subT.items.push(mod); }
                        } else {
                            if(!top.items) top.items = []; top.items.push(mod);
                        }
                    }
                } else {
                    // Attach directly to chapter
                    if(!ch.items) ch.items = []; ch.items.push(mod);
                }
            });
        }

        // --- SIDEBAR RENDERER ---
        function renderDirectory() {
            const dir = document.getElementById('directory-container');
            dir.innerHTML = '';
            
            let idCounter = 0;
            
            mappedCurriculum.forEach(sub => {
                dir.innerHTML += `<div class="dir-subject">${sub.subject}</div>`;
                
                sub.parts.forEach(part => {
                    dir.innerHTML += `<div class="dir-part">${part.part}</div>`;
                    
                    part.chapters.forEach(ch => {
                        const chId = `tree-${idCounter++}`;
                        let isChOpen = currentItem && (currentItem.chapter === ch.title);
                        
                        let chHTML = `
                            <div class="dir-chapter" onclick="toggleTree('${chId}')">
                                <span style="font-size:0.6rem; color:var(--text-muted); width:12px;" id="icon-${chId}">${isChOpen ? '▼' : '▶'}</span>
                                <span style="flex:1;">${ch.title}</span>
                            </div>
                            <div class="tree-group ${isChOpen ? 'open' : ''}" id="${chId}">
                        `;
                        
                        // Render Chapter-level items
                        if(ch.items) chHTML += renderItems(ch.items);
                        
                        // Render Topics
                        ch.topics.forEach(top => {
                            const topId = `tree-${idCounter++}`;
                            let isTopOpen = currentItem && (currentItem.topic === top.title);
                            
                            chHTML += `
                                <div class="dir-topic" onclick="toggleTree('${topId}')">
                                    <span style="font-size:0.5rem; width:10px;" id="icon-${topId}">${isTopOpen ? '▼' : '▶'}</span>
                                    <span>${top.title}</span>
                                </div>
                                <div class="tree-group ${isTopOpen ? 'open' : ''}" id="${topId}">
                            `;
                            
                            if(top.items) chHTML += renderItems(top.items);
                            
                            // Render Subtopics
                            if(top.subtopics) {
                                top.subtopics.forEach(subT => {
                                    const subTId = `tree-${idCounter++}`;
                                    let isSubOpen = currentItem && (currentItem.subtopic === subT.title);
                                    
                                    chHTML += `
                                        <div class="dir-subtopic" onclick="toggleTree('${subTId}')">
                                            <span style="font-size:0.5rem; width:10px;" id="icon-${subTId}">${isSubOpen ? '▼' : '▶'}</span>
                                            <span>${subT.title}</span>
                                        </div>
                                        <div class="tree-group ${isSubOpen ? 'open' : ''}" id="${subTId}">
                                    `;
                                    if(subT.items) chHTML += renderItems(subT.items);
                                    chHTML += `</div>`; // Close Subtopic
                                });
                            }
                            chHTML += `</div>`; // Close Topic
                        });
                        
                        chHTML += `</div>`; // Close Chapter
                        dir.innerHTML += chHTML;
                    });
                });
            });
        }

        function renderItems(itemsArray) {
            let html = '';
            itemsArray.forEach(item => {
                const isDone = quizScores[item.id] !== undefined;
                const isActive = currentItem && currentItem.id === item.id;
                html += `
                    <div class="dir-item ${isActive ? 'active' : ''}" onclick="loadItem('${item.id}')">
                        <span>${item.type === 'reading' ? '📄' : (item.mode==='learning'?'🧠':'📝')} ${item.title}</span>
                        <div class="status-dot ${isDone ? 'done' : ''}"></div>
                    </div>`;
            });
            return html;
        }

        window.toggleTree = function(id) {
            const el = document.getElementById(id);
            const icon = document.getElementById(`icon-${id}`);
            if(el.classList.contains('open')) { el.classList.remove('open'); icon.innerText = '▶'; } 
            else { el.classList.add('open'); icon.innerText = '▼'; }
        }

        // --- CONTENT ROUTING ---
        window.loadItem = function(itemId) {
            currentItem = window.LMS_PORTAL.find(m => m.id === itemId);
            if(!currentItem) return;

            renderDirectory(); 
            document.getElementById('view-dashboard').style.display = 'none';
            document.getElementById('view-report').style.display = 'none';
            
            document.getElementById('breadcrumb').innerHTML = `${currentItem.subject} / ${currentItem.chapter}`;

            if (!userAnswers[currentItem.id]) userAnswers[currentItem.id] = {};

            if (currentItem.type === 'reading') {
                renderReading();
            } else if (quizScores[currentItem.id] !== undefined) {
                renderReport();
            } else {
                renderQuiz();
            }
        }

        function renderReading() {
            document.getElementById('view-quiz').style.display = 'block';
            document.getElementById('quiz-title').innerText = currentItem.title;
            document.getElementById('quiz-subtitle').innerText = currentItem.subtopic || currentItem.topic || currentItem.chapter;
            document.getElementById('quiz-mode-tag').innerText = 'Reading Material';
            
            document.getElementById('questions-container').innerHTML = '';
            document.getElementById('submit-container').innerHTML = '';
            
            const rCont = document.getElementById('reading-container');
            rCont.style.display = 'block';
            rCont.innerHTML = currentItem.html;
            
            quizScores[currentItem.id] = 'read'; 
            saveState();
            document.getElementById('content-scroll').scrollTo({ top: 0 });
            if (typeof MathJax !== 'undefined') MathJax.typesetPromise([rCont]);
        }

        function renderQuiz() {
            document.getElementById('view-quiz').style.display = 'block';
            document.getElementById('reading-container').style.display = 'none';
            document.getElementById('quiz-title').innerText = currentItem.title;
            document.getElementById('quiz-subtitle').innerText = currentItem.subtopic || currentItem.topic || currentItem.chapter;
            document.getElementById('quiz-mode-tag').innerText = currentItem.mode === 'learning' ? '🧠 Learning Mode' : '📝 Classic Test';

            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            currentItem.data.forEach((qObj, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'q-block';
                
                const ans = userAnswers[currentItem.id][index];
                const isAns = ans !== undefined;
                const isLearning = currentItem.mode === 'learning';
                
                let optsHTML = '<div class="opt-list">';
                qObj.o.forEach((opt, optIndex) => {
                    const isChecked = isAns && ans === optIndex;
                    let classes = 'opt-label ';
                    if (isAns && isLearning) {
                        classes += 'locked ';
                        if (optIndex === qObj.a) classes += 'correct ';
                        else if (isChecked) classes += 'incorrect ';
                    } else if (isChecked && !isLearning) {
                        classes += 'selected-classic ';
                    }
                    optsHTML += `<label class="${classes}" id="lbl-${index}-${optIndex}">
                            <input type="radio" name="q-${index}" value="${optIndex}" ${isChecked ? 'checked' : ''} ${isAns && isLearning ? 'disabled' : ''} onchange="selectAnswer(${index}, ${optIndex})"> 
                            <span class="opt-text">${opt}</span></label>`;
                });
                optsHTML += '</div>';

                let fbHTML = `<div id="fb-${index}" class="feedback-box"></div>`;
                if (isAns && isLearning) {
                    const isCorrect = ans === qObj.a;
                    fbHTML = `<div id="fb-${index}" class="feedback-box ${isCorrect ? 'is-correct' : 'is-wrong'}" style="display:block;">
                            <div class="fb-title">${isCorrect ? '<span style="color:var(--success);">✓ Correct</span>' : '<span style="color:var(--danger);">✗ Incorrect</span>'}</div>
                            <div class="fb-section"><span>Logic</span><p>${qObj.e}</p></div>
                            <div class="fb-section"><span>Note</span><p>${qObj.n}</p></div></div>`;
                }

                qDiv.innerHTML = `<div class="q-text">${index + 1}. ${qObj.q}</div>${optsHTML}${fbHTML}`;
                container.appendChild(qDiv);
            });

            document.getElementById('submit-container').innerHTML = `<button class="btn btn-solid" onclick="submitQuiz()">Submit Assignment</button>`;
            document.getElementById('content-scroll').scrollTo({ top: 0 });
            if (typeof MathJax !== 'undefined') MathJax.typesetPromise([container]);
        }

        window.selectAnswer = function(qIndex, optIndex) {
            const isLearning = currentItem.mode === 'learning';
            if (isLearning && userAnswers[currentItem.id][qIndex] !== undefined) return;

            userAnswers[currentItem.id][qIndex] = optIndex;
            saveState();
            
            if (isLearning) {
                const qObj = currentItem.data[qIndex];
                const isCorrect = optIndex === qObj.a;
                for(let i=0; i<4; i++) {
                    const lbl = document.getElementById(`lbl-${qIndex}-${i}`);
                    lbl.classList.add('locked');
                    lbl.querySelector('input').disabled = true;
                    if (i === qObj.a) lbl.classList.add('correct');
                    else if (i === optIndex) lbl.classList.add('incorrect');
                }
                const fb = document.getElementById(`fb-${qIndex}`);
                fb.className = `feedback-box ${isCorrect ? 'is-correct' : 'is-wrong'}`;
                fb.innerHTML = `<div class="fb-title">${isCorrect ? '<span style="color:var(--success);">✓ Correct</span>' : '<span style="color:var(--danger);">✗ Incorrect</span>'}</div>
                    <div class="fb-section"><span>Logic</span><p>${qObj.e}</p></div>
                    <div class="fb-section"><span>Note</span><p>${qObj.n}</p></div>`;
                fb.style.display = 'block';
                if (typeof MathJax !== 'undefined') MathJax.typesetPromise([fb]);
            } else {
                for(let i=0; i<4; i++) document.getElementById(`lbl-${qIndex}-${i}`).classList.remove('selected-classic');
                document.getElementById(`lbl-${qIndex}-${optIndex}`).classList.add('selected-classic');
            }
        }

        window.submitQuiz = function() {
            const total = currentItem.data.length;
            const answered = Object.keys(userAnswers[currentItem.id]).length;
            if (answered < total) { if(!confirm(`You answered ${answered} of ${total}. Submit anyway?`)) return; }

            let score = 0;
            currentItem.data.forEach((q, i) => { if(userAnswers[currentItem.id][i] === q.a) score++; });
            quizScores[currentItem.id] = score;
            saveState();
            renderReport();
        }

        function renderReport() {
            document.getElementById('view-quiz').style.display = 'none';
            document.getElementById('view-report').style.display = 'block';
            
            const score = quizScores[currentItem.id];
            const total = currentItem.data.length;
            const perc = ((score / total) * 100).toFixed(0);
            
            const repDiv = document.getElementById('printable-report');
            let html = `
                <div style="text-align:center; margin-bottom:32px;">
                    <h2 style="font-size:2rem; margin-bottom:8px;">${currentItem.title}</h2>
                    <p style="color:var(--text-muted);">${currentItem.chapter} | Completed on ${new Date().toLocaleDateString()}</p>
                </div>
                <div class="report-summary">
                    <p style="text-transform:uppercase; font-weight:700; color:var(--text-muted); font-size:0.85rem;">Final Score</p>
                    <div class="report-score" style="color: ${perc >= 70 ? 'var(--success)' : 'var(--text-main)'};">${score} / ${total}</div>
                    <p style="font-weight:500;">Accuracy: ${perc}%</p>
                </div>
            `;

            currentItem.data.forEach((q, i) => {
                const uAns = userAnswers[currentItem.id][i];
                const isCorr = uAns === q.a;
                const ansText = uAns !== undefined ? q.o[uAns] : 'Skipped';
                
                html += `
                    <div style="padding: 24px 0; border-bottom: 1px solid var(--border);">
                        <h3 style="font-size:1.1rem; font-weight:500; margin-bottom:12px;">${i+1}. ${q.q}</h3>
                        <p style="margin-bottom:6px;"><strong>Your Answer:</strong> <span style="color: ${isCorr ? 'var(--success)' : 'var(--danger)'}">${ansText}</span></p>
                        ${!isCorr ? `<p style="margin-bottom:16px;"><strong>Correct Answer:</strong> <span style="color:var(--success); font-weight:500;">${q.o[q.a]}</span></p>` : ''}
                        
                        <div style="background: var(--bg-main); padding: 16px; border-radius: var(--radius); margin-top: 16px;">
                            <span style="font-size:0.8rem; font-weight:600; text-transform:uppercase; color:var(--text-muted); display:block; margin-bottom:4px;">Logic</span>
                            <p style="font-size:0.95rem; margin-bottom:12px;">${q.e}</p>
                            <span style="font-size:0.8rem; font-weight:600; text-transform:uppercase; color:var(--text-muted); display:block; margin-bottom:4px;">Note</span>
                            <p style="font-size:0.95rem;">${q.n}</p>
                        </div>
                    </div>`;
            });

            repDiv.innerHTML = html;
            document.getElementById('content-scroll').scrollTo({ top: 0 });
            if (typeof MathJax !== 'undefined') MathJax.typesetPromise([repDiv]);
        }

        window.retakeQuiz = function() {
            if(!confirm(`Clear your score and retake this assignment?`)) return;
            delete quizScores[currentItem.id]; userAnswers[currentItem.id] = {};
            saveState(); loadItem(currentItem);
        }

        window.exportPDF = function() {
            const opt = { margin: 15, filename: `${currentItem.title}_Report.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            html2pdf().set(opt).from(document.getElementById('printable-report')).save();
        }
    </script>
