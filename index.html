<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Learning Portal</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] }, svg: { fontCache: 'global' } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        /* --- Minimalist Design System --- */
        :root {
            --bg-main: #FAFAFA; --bg-surface: #FFFFFF; --sidebar-bg: #F4F4F5;
            --text-main: #09090B; --text-muted: #71717A;
            --border: #E4E4E7; --border-hover: #D4D4D8;
            --primary: #18181B; --primary-hover: #27272A;
            --success: #10B981; --success-bg: #ECFDF5;
            --danger: #EF4444; --danger-bg: #FEF2F2;
            --radius: 6px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; font-size: 15px; }

        /* --- Login View --- */
        #login-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-surface); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { width: 100%; max-width: 320px; text-align: center; }
        .login-box h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 8px; }
        .login-box p { color: var(--text-muted); margin-bottom: 24px; font-size: 0.95rem; }
        .input-field { width: 100%; padding: 10px 12px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.95rem; background: var(--bg-main); outline: none; }
        .input-field:focus { border-color: var(--text-main); background: var(--bg-surface); }
        .btn-solid { width: 100%; padding: 10px 12px; background: var(--primary); color: white; border: none; border-radius: var(--radius); font-weight: 500; cursor: pointer; transition: 0.2s; }
        .btn-solid:hover { background: var(--primary-hover); }
        .error-text { color: var(--danger); font-size: 0.85rem; margin-top: 12px; display: none; }

        /* --- Main App Layout --- */
        #app-view { display: none; width: 100%; height: 100%; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .student-name { font-weight: 600; font-size: 0.95rem; }
        .btn-text { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        .btn-text:hover { color: var(--text-main); }
        
        .directory { flex: 1; overflow-y: auto; padding: 16px 8px; }
        .dir-subject { font-size: 0.75rem; text-transform: uppercase; font-weight: 600; color: var(--text-muted); letter-spacing: 0.05em; padding: 8px; margin-top: 12px; }
        .dir-chapter { padding: 6px 8px; font-weight: 500; cursor: pointer; border-radius: var(--radius); transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        .dir-chapter:hover { background: var(--border); }
        .dir-topic-group { padding-left: 12px; margin-left: 12px; border-left: 1px solid var(--border); display: none; margin-top: 4px; margin-bottom: 8px;}
        .dir-topic-group.open { display: block; }
        .dir-item { padding: 6px 8px; font-size: 0.9rem; color: var(--text-muted); cursor: pointer; border-radius: var(--radius); transition: 0.2s; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px;}
        .dir-item:hover { color: var(--text-main); background: var(--border-hover); }
        .dir-item.active { background: var(--bg-surface); color: var(--text-main); font-weight: 500; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
        
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
        .status-dot.done { background: var(--success); }

        /* Content Area */
        .content-area { flex: 1; background: var(--bg-surface); overflow-y: auto; position: relative; }
        .content-inner { max-width: 720px; margin: 0 auto; padding: 60px 40px; animation: fadeIn 0.3s ease; }
        
        /* Quiz Elements */
        .quiz-header { margin-bottom: 40px; }
        .quiz-type { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em; margin-bottom: 8px; display: block; }
        .quiz-title { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 8px; }
        
        .q-block { margin-bottom: 48px; }
        .q-text { font-size: 1.1rem; font-weight: 500; margin-bottom: 16px; line-height: 1.6; }
        .opt-list { display: flex; flex-direction: column; gap: 8px; }
        .opt-label { display: flex; align-items: flex-start; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: 0.2s; background: var(--bg-surface); }
        .opt-label:hover:not(.locked) { border-color: var(--text-muted); background: var(--bg-main); }
        .opt-label input { margin-top: 4px; margin-right: 12px; accent-color: var(--primary); }
        .opt-text { flex: 1; line-height: 1.5; }
        
        .opt-label.locked { cursor: default; opacity: 0.7; }
        .opt-label.selected-classic { border-color: var(--primary); background: var(--bg-main); }
        .opt-label.correct { border-color: var(--success); background: var(--success-bg); color: #065F46; opacity: 1; }
        .opt-label.incorrect { border-color: var(--danger); background: var(--danger-bg); text-decoration: line-through; opacity: 0.6; }

        /* Feedback Box */
        .feedback-box { margin-top: 16px; padding: 16px 20px; border-radius: var(--radius); border-left: 3px solid; display: none; font-size: 0.95rem; line-height: 1.6; }
        .feedback-box.is-correct { background: var(--bg-main); border-left-color: var(--success); }
        .feedback-box.is-wrong { background: var(--bg-main); border-left-color: var(--danger); }
        .fb-title { font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px;}
        .fb-section { margin-top: 12px; }
        .fb-section span { font-weight: 600; color: var(--text-main); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 4px;}

        /* Report UI */
        .report-summary { padding: 32px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-main); text-align: center; margin-bottom: 48px; }
        .report-score { font-size: 3rem; font-weight: 700; letter-spacing: -0.02em; margin: 8px 0; }
        .action-bar { display: flex; gap: 12px; margin-top: 32px; padding-top: 32px; border-top: 1px solid var(--border); }
        .btn-outline { padding: 10px 16px; border: 1px solid var(--border); background: var(--bg-surface); border-radius: var(--radius); cursor: pointer; font-weight: 500; transition: 0.2s; text-align: center; flex: 1; }
        .btn-outline:hover { background: var(--bg-main); border-color: var(--text-muted); }
        .empty-state { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="login-view">
        <div class="login-box">
            <h1>Student Portal</h1>
            <p>Sign in to access your modules</p>
            <input type="text" id="username" class="input-field" placeholder="Username" onkeypress="if(event.key==='Enter') login()">
            <input type="password" id="password" class="input-field" placeholder="Password" onkeypress="if(event.key==='Enter') login()">
            <button class="btn-solid" onclick="login()">Continue</button>
            <div id="login-error" class="error-text">Invalid credentials</div>
        </div>
    </div>

    <div id="app-view">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="student-name" id="student-name-display">Student</span>
                <button class="btn-text" onclick="logout()">Logout</button>
            </div>
            <div class="directory" id="directory-container">
                </div>
        </aside>

        <main class="content-area" id="content-scroll">
            <div class="content-inner" id="content-inner">
                <div class="empty-state" id="empty-state">
                    <h3>Select a module</h3>
                    <p style="font-size:0.9rem; margin-top:8px;">Choose an item from the directory to begin.</p>
                </div>

                <div id="quiz-view" style="display: none;">
                    <div class="quiz-header">
                        <span class="quiz-type" id="quiz-mode-tag">Mode</span>
                        <h1 class="quiz-title" id="quiz-title">Title</h1>
                        <p style="color: var(--text-muted);" id="quiz-subtitle">Subtitle</p>
                    </div>
                    <div id="questions-container"></div>
                    <div id="submit-container" style="margin-top: 40px;"></div>
                </div>

                <div id="report-view" style="display: none;">
                    <div id="printable-report"></div>
                    <div class="action-bar">
                        <button class="btn-outline" onclick="exportPDF()">Download PDF Report</button>
                        <button class="btn-outline" style="color: var(--danger); border-color: var(--danger);" onclick="retakeQuiz()">Clear Score & Retake</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- 1. INITIALIZE THE GLOBAL PLUGIN ARRAY ---
        window.LMS_PORTAL = [];
        
        // Define allowed users centrally
        const validAccounts = { 'icchansh': '1234', 'roshan': 'admin' };

        // --- STATE MANAGEMENT ---
        let loggedInUser = null;
        let currentItem = null;
        let userAnswers = {}; 
        let quizScores = {};  

        const storage = {
            get: (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } },
            set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
        };

        function getStorageKey() { return `lms_v2_${loggedInUser}`; }
        function saveState() {
            storage.set(getStorageKey(), { answers: userAnswers, scores: quizScores });
            renderDirectory(); 
        }

        // --- ENGINE LOGIC ---
        function login() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            
            if (validAccounts[user] && validAccounts[user] === pass) {
                loggedInUser = user;
                document.getElementById('login-error').style.display = 'none';
                
                const saved = storage.get(getStorageKey());
                userAnswers = saved ? saved.answers : {};
                quizScores = saved ? saved.scores : {};

                document.getElementById('login-view').style.display = 'none';
                document.getElementById('app-view').style.display = 'flex';
                document.getElementById('student-name-display').innerText = user.charAt(0).toUpperCase() + user.slice(1);
                
                renderDirectory();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function logout() {
            loggedInUser = null;
            document.getElementById('app-view').style.display = 'none';
            document.getElementById('login-view').style.display = 'flex';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            hideContent();
        }

        // Dynamically build the sidebar from the injected .js modules
        function renderDirectory() {
            const dir = document.getElementById('directory-container');
            dir.innerHTML = '';
            
            // Filter modules intended for this user
            const userModules = window.LMS_PORTAL.filter(mod => mod.targetUser === loggedInUser || mod.targetUser === 'all');
            
            // Group by Subject, then Chapter
            const curriculum = {};
            userModules.forEach(mod => {
                if(!curriculum[mod.subjectTitle]) curriculum[mod.subjectTitle] = {};
                if(!curriculum[mod.subjectTitle][mod.chapterTitle]) curriculum[mod.subjectTitle][mod.chapterTitle] = [];
                curriculum[mod.subjectTitle][mod.chapterTitle].push(mod);
            });

            let subIndex = 0;
            for (const [subject, chapters] of Object.entries(curriculum)) {
                dir.innerHTML += `<div class="dir-subject">${subject}</div>`;
                
                let chIndex = 0;
                for (const [chapter, items] of Object.entries(chapters)) {
                    const chId = `ch-${subIndex}-${chIndex}`;
                    let isOpen = currentItem && items.some(i => i.id === currentItem.id);

                    const chDiv = document.createElement('div');
                    chDiv.innerHTML = `
                        <div class="dir-chapter" onclick="toggleAccordion('${chId}')">
                            <span style="font-size:0.7rem; color:var(--text-muted);" id="icon-${chId}">${isOpen ? '▼' : '▶'}</span>
                            ${chapter}
                        </div>
                        <div class="dir-topic-group ${isOpen ? 'open' : ''}" id="${chId}"></div>
                    `;
                    dir.appendChild(chDiv);
                    
                    const groupDiv = document.getElementById(chId);
                    items.forEach(item => {
                        const isDone = quizScores[item.id] !== undefined;
                        const isActive = currentItem && currentItem.id === item.id;
                        
                        const itemDiv = document.createElement('div');
                        itemDiv.className = `dir-item ${isActive ? 'active' : ''}`;
                        itemDiv.onclick = () => loadItem(item);
                        itemDiv.innerHTML = `<span>📝 ${item.moduleTitle}</span><div class="status-dot ${isDone ? 'done' : ''}"></div>`;
                        groupDiv.appendChild(itemDiv);
                    });
                    chIndex++;
                }
                subIndex++;
            }
        }

        window.toggleAccordion = function(id) {
            const el = document.getElementById(id);
            const icon = document.getElementById(`icon-${id}`);
            if(el.classList.contains('open')) { el.classList.remove('open'); icon.innerText = '▶'; } 
            else { el.classList.add('open'); icon.innerText = '▼'; }
        }

        function hideContent() {
            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('report-view').style.display = 'none';
        }

        function loadItem(item) {
            currentItem = item;
            renderDirectory(); 
            hideContent();

            if (!userAnswers[item.id]) userAnswers[item.id] = {};

            if (quizScores[item.id] !== undefined) renderReport();
            else renderQuiz();
        }

        function renderQuiz() {
            document.getElementById('quiz-view').style.display = 'block';
            document.getElementById('quiz-title').innerText = currentItem.moduleTitle;
            document.getElementById('quiz-subtitle').innerText = `${currentItem.subjectTitle} | ${currentItem.chapterTitle}`;
            document.getElementById('quiz-mode-tag').innerText = currentItem.mode === 'learning' ? 'Learning Mode' : 'Classic Test';
            document.getElementById('quiz-mode-tag').style.color = currentItem.mode === 'learning' ? 'var(--success)' : 'var(--text-muted)';

            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            currentItem.data.forEach((qObj, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'q-block';
                
                const ans = userAnswers[currentItem.id][index];
                const isAns = ans !== undefined;
                const isLearning = currentItem.mode === 'learning';
                
                let optsHTML = '<div class="opt-list">';
                qObj.o.forEach((opt, optIndex) => {
                    const isChecked = isAns && ans === optIndex;
                    let classes = 'opt-label ';
                    
                    if (isAns && isLearning) {
                        classes += 'locked ';
                        if (optIndex === qObj.a) classes += 'correct ';
                        else if (isChecked) classes += 'incorrect ';
                    } else if (isChecked && !isLearning) {
                        classes += 'selected-classic ';
                    }

                    optsHTML += `<label class="${classes}" id="lbl-${index}-${optIndex}">
                            <input type="radio" name="q-${index}" value="${optIndex}" ${isChecked ? 'checked' : ''} ${isAns && isLearning ? 'disabled' : ''} onchange="selectAnswer(${index}, ${optIndex})"> 
                            <span class="opt-text">${opt}</span></label>`;
                });
                optsHTML += '</div>';

                let fbHTML = `<div id="fb-${index}" class="feedback-box"></div>`;
                if (isAns && isLearning) {
                    const isCorrect = ans === qObj.a;
                    fbHTML = `<div id="fb-${index}" class="feedback-box ${isCorrect ? 'is-correct' : 'is-wrong'}" style="display:block;">
                            <div class="fb-title">${isCorrect ? '<span style="color:var(--success);">✓ Correct</span>' : '<span style="color:var(--danger);">✗ Incorrect</span>'}</div>
                            <div class="fb-section"><span>Logic</span><p>${qObj.e}</p></div>
                            <div class="fb-section"><span>Note</span><p>${qObj.n}</p></div></div>`;
                }

                qDiv.innerHTML = `<div class="q-text">${index + 1}. ${qObj.q}</div>${optsHTML}${fbHTML}`;
                container.appendChild(qDiv);
            });

            document.getElementById('submit-container').innerHTML = `<button class="btn-solid" onclick="submitQuiz()">Submit Assignment</button>`;
            document.getElementById('content-scroll').scrollTo({ top: 0 });
            if (typeof MathJax !== 'undefined') MathJax.typesetPromise([container]);
        }

        window.selectAnswer = function(qIndex, optIndex) {
            const isLearning = currentItem.mode === 'learning';
            if (isLearning && userAnswers[currentItem.id][qIndex] !== undefined) return;

            userAnswers[currentItem.id][qIndex] = optIndex;
            saveState();
            
            if (isLearning) {
                const qObj = currentItem.data[qIndex];
                const isCorrect = optIndex === qObj.a;
                
                for(let i=0; i<4; i++) {
                    const lbl = document.getElementById(`lbl-${qIndex}-${i}`);
                    const inp = lbl.querySelector('input');
                    lbl.classList.add('locked');
                    inp.disabled = true;
                    if (i === qObj.a) lbl.classList.add('correct');
                    else if (i === optIndex) lbl.classList.add('incorrect');
                }
                
                const fb = document.getElementById(`fb-${qIndex}`);
                fb.className = `feedback-box ${isCorrect ? 'is-correct' : 'is-wrong'}`;
                fb.innerHTML = `<div class="fb-title">${isCorrect ? '<span style="color:var(--success);">✓ Correct</span>' : '<span style="color:var(--danger);">✗ Incorrect</span>'}</div>
                    <div class="fb-section"><span>Logic</span><p>${qObj.e}</p></div>
                    <div class="fb-section"><span>Note</span><p>${qObj.n}</p></div>`;
                fb.style.display = 'block';

                if (typeof MathJax !== 'undefined') MathJax.typesetPromise([fb]);
            } else {
                for(let i=0; i<4; i++) { document.getElementById(`lbl-${qIndex}-${i}`).classList.remove('selected-classic'); }
                document.getElementById(`lbl-${qIndex}-${optIndex}`).classList.add('selected-classic');
            }
        }

        window.submitQuiz = function() {
            const total = currentItem.data.length;
            const answered = Object.keys(userAnswers[currentItem.id]).length;
            if (answered < total) {
                if(!confirm(`You answered ${answered} of ${total}. Submit anyway?`)) return;
            }

            let score = 0;
            currentItem.data.forEach((q, i) => { if(userAnswers[currentItem.id][i] === q.a) score++; });
            quizScores[currentItem.id] = score;
            saveState();
            renderReport();
        }

        function renderReport() {
            hideContent();
            document.getElementById('report-view').style.display = 'block';
            
            const score = quizScores[currentItem.id];
            const total = currentItem.data.length;
            const perc = ((score / total) * 100).toFixed(0);
            
            const repDiv = document.getElementById('printable-report');
            let html = `
                <div style="text-align:center; margin-bottom:32px;">
                    <h2 style="font-size:2rem; letter-spacing:-0.02em; margin-bottom:8px;">${currentItem.moduleTitle}</h2>
                    <p style="color:var(--text-muted);">${currentItem.subjectTitle} | Completed on ${new Date().toLocaleDateString()}</p>
                </div>
                <div class="report-summary">
                    <p style="text-transform:uppercase; font-weight:600; color:var(--text-muted); font-size:0.85rem;">Final Score</p>
                    <div class="report-score" style="color: ${perc >= 70 ? 'var(--success)' : 'var(--text-main)'};">${score} / ${total}</div>
                    <p style="font-weight:500;">Accuracy: ${perc}%</p>
                </div>
            `;

            currentItem.data.forEach((q, i) => {
                const uAns = userAnswers[currentItem.id][i];
                const isCorr = uAns === q.a;
                const ansText = uAns !== undefined ? q.o[uAns] : 'Skipped';
                
                html += `
                    <div style="padding: 24px 0; border-bottom: 1px solid var(--border);">
                        <h3 style="font-size:1.1rem; font-weight:500; margin-bottom:12px; line-height:1.5;">${i+1}. ${q.q}</h3>
                        <p style="margin-bottom:6px;"><strong>Your Answer:</strong> <span style="color: ${isCorr ? 'var(--success)' : 'var(--danger)'}">${ansText}</span></p>
                        ${!isCorr ? `<p style="margin-bottom:16px;"><strong>Correct Answer:</strong> <span style="color:var(--success); font-weight:500;">${q.o[q.a]}</span></p>` : ''}
                        
                        <div style="background: var(--bg-main); padding: 16px; border-radius: var(--radius); margin-top: 16px;">
                            <span style="font-size:0.8rem; font-weight:600; text-transform:uppercase; color:var(--text-muted); display:block; margin-bottom:4px;">Logic</span>
                            <p style="font-size:0.95rem; margin-bottom:12px;">${q.e}</p>
                            <span style="font-size:0.8rem; font-weight:600; text-transform:uppercase; color:var(--text-muted); display:block; margin-bottom:4px;">Note</span>
                            <p style="font-size:0.95rem;">${q.n}</p>
                        </div>
                    </div>`;
            });

            repDiv.innerHTML = html;
            document.getElementById('content-scroll').scrollTo({ top: 0 });
            if (typeof MathJax !== 'undefined') MathJax.typesetPromise([repDiv]);
        }

        window.retakeQuiz = function() {
            if(!confirm(`Clear your score and retake this assignment?`)) return;
            delete quizScores[currentItem.id];
            userAnswers[currentItem.id] = {};
            saveState();
            loadItem(currentItem);
        }

        window.exportPDF = function() {
            const element = document.getElementById('printable-report');
            const opt = { margin: 15, filename: `${currentItem.moduleTitle}_Report.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            html2pdf().set(opt).from(element).save();
        }

        // Optional: Auto-login if local storage exists
        window.onload = () => {
            const savedUser = localStorage.getItem('lms_last_user');
            if(savedUser) {
                document.getElementById('username').value = savedUser;
                // Requires manual password entry for security, or auto-login if you prefer
            }
        };
    </script>

    <script src="modules/sample_quiz.js"></script>

</body>
</html>
