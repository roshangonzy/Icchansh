<script>
const validAccounts = { 'icchansh': '1234' };

// ============================================================================

const masterQuizData = {
    conceptual: {
        easy: {
            ch3: {
                title: "Conceptual Focus: Chemical Kinetics (Easy)",
                questions: [
    { 
        q: "How is the 'Rate of a Chemical Reaction' formally defined?", 
        o: ["The total heat energy released during the reaction.", "The change in concentration of a reactant or product per unit time.", "The total time it takes for a reaction to completely stop.", "The number of moles of catalyst consumed."], 
        a: 1, 
        logic: "Rate measures the speed of the reaction by tracking how fast reactants disappear or products appear over time.", 
        note: "In chemical kinetics, 'rate' always refers to speed. Mathematically, it is expressed as the change in concentration divided by the specific time interval. For reactants, the rate is calculated as a decrease, and for products, it is calculated as an increase." 
    },
    { 
        q: "What is the standard, typical unit used for expressing the rate of an aqueous chemical reaction?", 
        o: ["$mol \\ L^{-1} \\ s^{-1}$", "$s^{-1}$", "$mol \\ s^{-1}$", "$L \\ mol^{-1} \\ s^{-1}$"], 
        a: 0, 
        logic: "Rate is Concentration divided by Time. Concentration is $mol/L$ and Time is $s$.", 
        note: "Since the rate of a reaction is defined as $\\frac{\\Delta \\text{Concentration}}{\\Delta \\text{Time}}$, the unit naturally follows as Molarity per second. Molarity is Moles per Liter ($mol \\ L^{-1}$), so dividing by seconds ($s$) gives $mol \\ L^{-1} \\ s^{-1}$." 
    },
    { 
        q: "For a gaseous reaction, the rate can be expressed in terms of partial pressure instead of molar concentration. What is the typical unit for this?", 
        o: ["$atm \\ L^{-1}$", "$atm \\ s^{-1}$", "$mol \\ atm^{-1}$", "$s \\ atm^{-1}$"], 
        a: 1, 
        logic: "Instead of Molarity per second, gaseous rates are measured in units of Pressure per second.", 
        note: "For gases, it is much easier to measure changes in partial pressure rather than molar concentration. Therefore, the rate is expressed as the change in atmospheric pressure over time, yielding the unit $atm \\ s^{-1}$." 
    },
    { 
        q: "Which of the following mathematical expressions correctly denotes the 'Instantaneous Rate' ($r_{inst}$) of a reaction?", 
        o: ["$r_{inst} = \\frac{-\\Delta[R]}{\\Delta t}$", "$r_{inst} = \\frac{-d[R]}{dt}$", "$r_{inst} = \\frac{[R]_2 - [R]_1}{t_2 - t_1}$", "$r_{inst} = k[R]^0$"], 
        a: 1, 
        logic: "Instantaneous rate uses differential calculus ($d/dt$) to measure the exact rate at an infinitesimally small moment in time.", 
        note: "Average rate uses delta ($\\Delta$) to measure the rate over a measurable time interval. However, because reaction rates constantly change, an average isn't very precise. Instantaneous rate is the exact speed at a specific, infinitesimally small moment, denoted by the derivative $\\frac{d}{dt}$." 
    },
    { 
        q: "How is the instantaneous rate of a reaction determined practically from a concentration vs. time curve?", 
        o: ["By calculating the total area under the curve.", "By drawing a straight line between the first and last data points.", "By drawing a tangent to the curve at time $t$ and calculating its slope.", "By finding the y-intercept of the curve."], 
        a: 2, 
        logic: "The slope of a tangent line on a concentration-time graph mathematically represents the instantaneous rate of change.", 
        note: "In calculus, the derivative ($d[R]/dt$) represents the slope of the tangent line. By plotting concentration on the y-axis and time on the x-axis, you can find the exact instantaneous rate at any specific second by drawing a straight tangent line against the curve at that exact point and calculating its geometric slope." 
    },
    { 
        q: "If the balanced stoichiometric equation is $2A \\rightarrow B$, how do you correctly express the unified rate of reaction in terms of the disappearance of A?", 
        o: ["Rate = $-\\frac{d[A]}{dt}$", "Rate = $-2 \\frac{d[A]}{dt}$", "Rate = $-\\frac{1}{2} \\frac{d[A]}{dt}$", "Rate = $\\frac{1}{2} \\frac{d[A]}{dt}$"], 
        a: 2, 
        logic: "You must divide the rate of disappearance by its stoichiometric coefficient to equate it to the overall reaction rate.", 
        note: "Because 2 moles of A are consumed for every 1 mole of B produced, reactant A is disappearing twice as fast as product B is appearing. To make the 'Rate of Reaction' a single, universal number regardless of which chemical you measure, we must divide the rate of disappearance of A by its stoichiometric coefficient (2). The negative sign indicates it is being consumed." 
    },
    { 
        q: "What does a 'Rate Law' (or Rate Expression) specifically represent?", 
        o: ["The theoretical speed of the reaction based on the balanced equation.", "The representation of the reaction rate strictly in terms of the concentration of the reactants.", "The temperature at which the reaction occurs.", "The total number of molecules colliding."], 
        a: 1, 
        logic: "The rate law mathematically connects the speed of the reaction to the current molar concentrations of the reactants.", 
        note: "A Rate Law is a mathematical equation (e.g., $\\text{Rate} = k[A]^x[B]^y$). It explicitly defines how the current concentration of the reactants dictates the current speed of the reaction. As a general rule, when reactant concentrations increase, the rate of the reaction also increases." 
    },
    { 
        q: "In the experimental rate equation $\\text{Rate} = k[A]^x[B]^y$, what does the constant '$k$' represent?", 
        o: ["The equilibrium constant", "The specific Rate Constant", "The stoichiometric coefficient", "The total kinetic energy"], 
        a: 1, 
        logic: "The letter $k$ is universally used as the proportionality constant in differential rate equations.", 
        note: "The Rate Constant ($k$) is a critical value. It is the proportionality constant that balances the rate equation. Importantly, $k$ is independent of the reactant concentrations, but it is highly dependent on the temperature of the system and the presence of a catalyst." 
    },
    { 
        q: "How does the 'Order of a Reaction' relate to the rate law expression $\\text{Rate} = k[A]^x[B]^y$?", 
        o: ["It is the sum of the stoichiometric coefficients from the balanced equation.", "It is the sum of the powers of the concentration of the reactants ($x+y$).", "It is the product of $x$ multiplied by $y$.", "It is simply the value of the rate constant $k$."], 
        a: 1, 
        logic: "The overall order is strictly defined as the mathematical sum of the exponents in the experimentally determined rate law.", 
        note: "The overall order of a reaction dictates exactly how sensitive the reaction rate is to changes in concentration. It is found simply by adding together the exponents attached to the reactant concentrations in the rate law. If $\\text{Rate} = k[A]^1[B]^2$, the overall order is $1+2=3$." 
    },
    { 
        q: "Which of the following is a TRUE statement regarding the possible numerical values for the Order of a reaction?", 
        o: ["Order must always be a positive whole integer.", "Order can only be 1, 2, or 3.", "Order can be 0, 1, 2, 3, and even a fraction.", "Order can never be zero."], 
        a: 2, 
        logic: "Because order is determined purely by experimental observation, it can take on zero or fractional values.", 
        note: "Unlike the stoichiometric coefficients in a balanced chemical equation (which are always whole numbers), the Order of a reaction is a purely experimental quantity. Depending on the complex mechanism of the reaction, the calculated order can easily be zero, a whole number, or even a fraction." 
    },
    { 
        q: "What does it mean if a chemical reaction is classified as a 'Zero-Order' reaction?", 
        o: ["The reaction rate is completely independent of the reactant concentration.", "The reaction does not require any activation energy.", "The reaction occurs instantaneously.", "The reaction produces zero products."], 
        a: 0, 
        logic: "In a zero-order reaction, $\\text{Rate} = k[R]^0$. Since anything to the power of 0 is 1, the Rate simply equals the constant $k$.", 
        note: "In a zero-order reaction, adding more reactant does absolutely nothing to speed up the reaction. The reaction proceeds at a steady, constant pace until the reactant is entirely gone. Common examples include enzyme-catalyzed reactions or the decomposition of gases on solid metal surfaces at high pressures." 
    },
    { 
        q: "What are the specific units of the rate constant ($k$) for a First-Order reaction?", 
        o: ["$mol \\ L^{-1} \\ s^{-1}$", "$mol^{-1} \\ L \\ s^{-1}$", "$s^{-1}$", "$L^2 \\ mol^{-2} \\ s^{-1}$"], 
        a: 2, 
        logic: "For first order, $\\text{Rate} = k[A]$. Since Rate is $M/s$ and $[A]$ is $M$, $k$ must be $1/s$ ($s^{-1}$) to balance the equation.", 
        note: "The units of the rate constant ($k$) change depending on the order of the reaction. For a Zero-order reaction, $k$ has the same units as the rate ($mol \\ L^{-1} \\ s^{-1}$). For a First-order reaction, the concentration units cancel out, leaving only inverse time ($s^{-1}$)." 
    },
    { 
        q: "What is the strict biological and chemical definition of the 'Molecularity' of a reaction?", 
        o: ["The overall order of a complex reaction.", "The number of reacting species (atoms, ions, or molecules) taking part in an elementary reaction that must collide simultaneously.", "The sum of the molecular weights of the reactants.", "The number of products formed."], 
        a: 1, 
        logic: "Molecularity is a theoretical concept counting the exact number of physical particles involved in a single collision event.", 
        note: "Molecularity looks at the microscopic level of an elementary (single-step) reaction. If one molecule breaks apart on its own, the reaction is unimolecular. If two molecules must smash into each other to react, it is bimolecular." 
    },
    { 
        q: "According to collision theory, why are 'Termolecular' reactions (molecularity of 3) considered very rare and exceptionally slow?", 
        o: ["Because three molecules weigh too much to move.", "Because the statistical probability of more than three molecules colliding simultaneously with the correct orientation is extremely small.", "Because termolecular reactions require absolute zero temperatures.", "Because they always have a zero-order rate law."], 
        a: 1, 
        logic: "Getting three specific objects to hit the exact same point at the exact same microsecond is highly improbable.", 
        note: "While bimolecular collisions (two molecules hitting each other) happen constantly, getting three or more molecules to collide simultaneously is like trying to get three moving billiard balls to strike each other perfectly at the exact same millisecond. Because the probability is so low, these reactions are rare and slow." 
    },
    { 
        q: "In chemical kinetics, what defines a 'Complex Reaction'?", 
        o: ["A reaction that uses complex transition metals.", "A reaction that occurs via a sequence of multiple elementary steps (a mechanism) rather than completing in one single step.", "A reaction with an activation energy above $100 \\text{ kJ/mol}$.", "A reaction that only occurs in biological enzymes."], 
        a: 1, 
        logic: "Complex reactions are broken down into a series of simpler, single-step reactions.", 
        note: "Most chemical reactions do not occur in a single, massive collision. Instead, they happen through a specific sequence of smaller, elementary reactions. This sequence of steps is called the reaction 'mechanism'. Reactions that require multiple steps are classified as complex reactions." 
    },
    { 
        q: "In a complex reaction with a multi-step mechanism, which specific step dictates the overall Rate of the Reaction?", 
        o: ["The very first step.", "The very last step.", "The fastest step.", "The slowest step (Rate Determining Step)."], 
        a: 3, 
        logic: "A chain is only as strong as its weakest link, and a complex reaction is only as fast as its slowest step.", 
        note: "Imagine a factory assembly line. If it takes 1 minute to attach the wheels but 1 hour to build the engine, you can still only produce one car per hour. The slowest elementary step in the mechanism strictly bottlenecks the entire process and is therefore called the Rate Determining Step." 
    },
    { 
        q: "Which of the following statements correctly highlights a key difference between Reaction Order and Molecularity?", 
        o: ["Molecularity can be zero, but Order cannot.", "Order is a theoretical concept, while Molecularity is determined purely by experiment.", "Order can be a fraction or zero, but Molecularity must always be a non-zero whole integer.", "They are entirely synonymous terms."], 
        a: 2, 
        logic: "Because molecularity counts physical molecules colliding, you cannot have zero molecules or half a molecule collide.", 
        note: "Order is an entirely experimental mathematical value derived from the rate law, so it can easily be 0, 1, 2, or even a fraction. Molecularity, however, is a theoretical count of physical particles participating in an elementary step. You cannot physically smash 'zero' molecules together." 
    },
    { 
        q: "What is the primary mathematical purpose of using 'Integrated Rate Equations'?", 
        o: ["To calculate the exact temperature of the reaction.", "To provide a direct relation between experimentally measured concentrations at different times and the rate constant ($k$), avoiding the difficulty of drawing tangent slopes.", "To calculate the activation energy.", "To determine the molecular weight of the catalyst."], 
        a: 1, 
        logic: "Integrated rate laws allow us to plug time and concentration directly into a formula to find the rate constant.", 
        note: "Finding the instantaneous rate by physically drawing tangent lines on a graph is difficult and prone to human error. By using calculus to integrate the differential rate equations, chemists created formulas that directly link concentration, time, and the rate constant ($k$), making experimental calculations much easier." 
    },
    { 
        q: "For a First-Order reaction, plotting $\\ln[R]$ (natural log of reactant concentration) against time ($t$) yields a straight line. What does the slope of this line represent?", 
        o: ["The initial concentration $[R]_0$", "The half-life $t_{1/2}$", "The negative rate constant ($-k$)", "The activation energy ($E_a$)"],

// APP LOGIC
// ============================================================================
let currentMode = 'conceptual';
let currentLevel = 'easy';
let currentChapter = 'ch3';
let loggedInUser = localStorage.getItem('cbseChemCh3User') || null;
let userAnswers = {};
let quizScores = {};

function initApp() {
    if (!loggedInUser) {
        document.getElementById('login-overlay').style.display = 'flex';
        document.getElementById('app-content').style.display = 'none';
        return;
    }
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    
    const displayName = loggedInUser.charAt(0).toUpperCase() + loggedInUser.slice(1);
    document.getElementById('welcome-text').innerText = `Welcome, ${displayName}`;

    const savedAnswers = localStorage.getItem(`cbseChemCh3Answers_${loggedInUser}`);
    const savedScores = localStorage.getItem(`cbseChemCh3Scores_${loggedInUser}`);

    if (savedAnswers && savedScores) {
        userAnswers = JSON.parse(savedAnswers);
        quizScores = JSON.parse(savedScores);
    } else {
        userAnswers = { 
            conceptual: { easy: {ch3:{}}, medium: {ch3:{}}, hard: {ch3:{}} }, 
            cbse: { easy: {ch3:{}}, medium: {ch3:{}}, hard: {ch3:{}} } 
        };
        quizScores = { 
            conceptual: { easy: {ch3:null}, medium: {ch3:null}, hard: {ch3:null} }, 
            cbse: { easy: {ch3:null}, medium: {ch3:null}, hard: {ch3:null} } 
        };
    }

    updateTabScores();
    loadQuiz('ch3'); 
}

function saveState() {
    if(!loggedInUser) return;
    localStorage.setItem(`cbseChemCh3Answers_${loggedInUser}`, JSON.stringify(userAnswers));
    localStorage.setItem(`cbseChemCh3Scores_${loggedInUser}`, JSON.stringify(quizScores));
}

function clearAppData() {
    if (confirm("Are you sure you want to completely clear the local data? This will erase all scores and answers for all accounts on this device.")) {
        localStorage.clear();
        alert("Local storage wiped successfully. Reloading the app...");
        location.reload(true);
    }
}

function handleLogin() {
    const userField = document.getElementById('username').value.trim().toLowerCase();
    const passField = document.getElementById('password').value.trim();

    if (validAccounts[userField] && validAccounts[userField] === passField) {
        loggedInUser = userField;
        localStorage.setItem('cbseChemCh3User', loggedInUser);
        document.getElementById('login-error').style.display = 'none';
        initApp();
    } else {
        document.getElementById('login-error').style.display = 'block';
    }
}

function handleEnter(e) { if (e.key === 'Enter') handleLogin(); }
function handleLogout() { localStorage.removeItem('cbseChemCh3User'); location.reload(); }

function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`mode-${mode}`).classList.add('active');
    loadQuiz(currentChapter);
}

function setLevel(level) {
    currentLevel = level;
    document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`btn-${level}`).classList.add('active');
    loadQuiz(currentChapter);
}

function updateTabScores() {
    ['ch3'].forEach(ch => {
        const score = quizScores[currentMode][currentLevel][ch];
        const activeData = masterQuizData[currentMode][currentLevel][ch];
        const total = activeData ? activeData.questions.length : 0;
        const badgeElement = document.getElementById(`badge-${ch}`);
        if (badgeElement) {
            badgeElement.innerHTML = score !== null ? `<span class="score-badge">${score}/${total}</span>` : '';
        }
    });
}

function loadQuiz(chapterId) {
    currentChapter = chapterId;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    const activeTab = document.getElementById(`tab-${chapterId}`);
    if(activeTab) activeTab.classList.add('active');
    
    updateTabScores();

    document.getElementById('quiz-view').classList.add('active');
    document.getElementById('report-view').classList.remove('active');
    document.getElementById('cbse-legend').style.display = (currentMode === 'cbse') ? 'block' : 'none';

    const activeData = masterQuizData[currentMode][currentLevel][chapterId];
    
    if(!activeData || !activeData.questions || activeData.questions.length === 0) {
        document.getElementById('quiz-title').innerText = activeData.title || "No Title";
        document.getElementById('questions-container').innerHTML = "<p style='color: var(--text-light); text-align: center; padding: 40px;'>⚠️ No questions loaded for this section yet. Paste the generated array into the master template.</p>";
        document.getElementById('submit-container').innerHTML = "";
        return;
    }

    document.getElementById('quiz-title').innerText = activeData.title;
    const container = document.getElementById('questions-container');
    container.innerHTML = '';

    activeData.questions.forEach((qObj, index) => {
        const qDiv = document.createElement('div');
        qDiv.className = 'question-block';
        const answeredOption = userAnswers[currentMode][currentLevel][chapterId][index];
        const isAnswered = answeredOption !== undefined;
        
        let optionsHTML = '';
        qObj.o.forEach((opt, optIndex) => {
            const isChecked = isAnswered && answeredOption === optIndex;
            let optionClasses = 'option-label ';
            if (isAnswered) {
                optionClasses += 'locked ';
                if (optIndex === qObj.a) optionClasses += 'correct-choice ';
                else if (isChecked) optionClasses += 'incorrect-choice ';
            }

            optionsHTML += `
                <label class="${optionClasses}" id="label-${currentMode}-${currentLevel}-${chapterId}-${index}-${optIndex}">
                    <input type="radio" name="q-${currentMode}-${currentLevel}-${chapterId}-${index}" value="${optIndex}" 
                    ${isChecked ? 'checked' : ''} ${isAnswered ? 'disabled' : ''}
                    onchange="selectAnswer('${chapterId}', ${index}, ${optIndex})">
                    ${opt}
                </label>
            `;
        });

        let feedbackHTML = '';
        if (isAnswered) {
            const isCorrect = answeredOption === qObj.a;
            feedbackHTML = `
                <div id="feedback-${currentMode}-${currentLevel}-${chapterId}-${index}" class="feedback-box ${isCorrect ? 'correct' : 'incorrect'}" style="display:block;">
                    <strong class="title">${isCorrect ? '✓ Correct!' : '✗ Incorrect.'}</strong>
                    <div class="logic-section">Logic: ${qObj.logic}</div>
                    <div class="note-section"><strong>Learning Note:</strong> ${qObj.note}</div>
                </div>
            `;
        } else {
            feedbackHTML = `<div id="feedback-${currentMode}-${currentLevel}-${chapterId}-${index}" class="feedback-box"></div>`;
        }

        qDiv.innerHTML = `<div class="question-text">${index + 1}. ${qObj.q}</div><div class="options-grid">${optionsHTML}</div>${feedbackHTML}`;
        container.appendChild(qDiv);
    });

    const submitContainer = document.getElementById('submit-container');
    const totalQ = activeData.questions.length;

    if (quizScores[currentMode][currentLevel][chapterId] !== null) {
        submitContainer.innerHTML = `<button class="btn btn-primary" onclick="showReport()">📊 View Report (Score: ${quizScores[currentMode][currentLevel][chapterId]}/${totalQ})</button>`;
    } else {
        submitContainer.innerHTML = `<button class="btn btn-primary" onclick="submitQuiz()">Submit & Get Final Report</button>`;
    }
    
    window.scrollTo({ top: 0, behavior: 'smooth' });

    if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
        MathJax.typesetPromise([container, document.getElementById('quiz-title')]).catch(err => console.log(err));
    }
}

window.selectAnswer = function(chapterId, qIndex, optIndex) {
    if (userAnswers[currentMode][currentLevel][chapterId][qIndex] !== undefined) return;

    userAnswers[currentMode][currentLevel][chapterId][qIndex] = optIndex;
    saveState();
    
    const qObj = masterQuizData[currentMode][currentLevel][chapterId].questions[qIndex];
    const isCorrect = optIndex === qObj.a;
    
    for(let i=0; i<4; i++) {
        const label = document.getElementById(`label-${currentMode}-${currentLevel}-${chapterId}-${qIndex}-${i}`);
        const input = label.querySelector('input');
        if (label && input) {
            label.classList.add('locked');
            input.disabled = true;
            if (i === qObj.a) label.classList.add('correct-choice');
            else if (i === optIndex) label.classList.add('incorrect-choice');
        }
    }
    
    const feedbackBox = document.getElementById(`feedback-${currentMode}-${currentLevel}-${chapterId}-${qIndex}`);
    feedbackBox.className = `feedback-box ${isCorrect ? 'correct' : 'incorrect'}`;
    feedbackBox.innerHTML = `<strong class="title">${isCorrect ? '✓ Correct!' : '✗ Incorrect.'}</strong><div class="logic-section">Logic: ${qObj.logic}</div><div class="note-section"><strong>Learning Note:</strong> ${qObj.note}</div>`;
    feedbackBox.style.display = 'block';

    if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
        MathJax.typesetPromise([feedbackBox]).catch(err => console.log(err));
    }
}

window.submitQuiz = function() {
    const activeData = masterQuizData[currentMode][currentLevel][currentChapter];
    const totalQ = activeData.questions.length;
    const answeredQ = Object.keys(userAnswers[currentMode][currentLevel][currentChapter]).length;

    if (answeredQ < totalQ) {
        if(!confirm(`You have only answered ${answeredQ} out of ${totalQ} questions. Unanswered questions will be marked wrong. Do you want to submit anyway?`)) return;
    }

    let score = 0;
    activeData.questions.forEach((qObj, index) => {
        if (userAnswers[currentMode][currentLevel][currentChapter][index] === qObj.a) score++;
    });
    
    quizScores[currentMode][currentLevel][currentChapter] = score;
    saveState();
    updateTabScores();
    showReport();
}

window.showReport = function() {
    const data = masterQuizData[currentMode][currentLevel][currentChapter];
    const score = quizScores[currentMode][currentLevel][currentChapter];
    const totalQ = data.questions.length;

    document.getElementById('quiz-view').classList.remove('active');
    document.getElementById('report-view').classList.add('active');
    
    const reportContainer = document.getElementById('printable-report');
    let reviewHTML = '';

    data.questions.forEach((qObj, index) => {
        const userAns = userAnswers[currentMode][currentLevel][currentChapter][index];
        const isAnswered = userAns !== undefined;
        const isCorrect = isAnswered && (userAns === qObj.a);

        const badgeClass = isCorrect ? 'badge-correct' : 'badge-incorrect';
        const badgeText = isCorrect ? '✓ Correct' : '✗ Incorrect';
        const userAnswerText = isAnswered ? qObj.o[userAns] : 'Not Answered';

        reviewHTML += `
            <div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                <span class="review-badge ${badgeClass}">${badgeText}</span>
                <div class="question-text">${index + 1}. ${qObj.q}</div>
                <p style="margin-bottom: 5px;"><strong>Your Answer:</strong> <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnswerText}</span></p>
                ${!isCorrect ? `<p style="margin-bottom: 5px;"><strong>Correct Answer:</strong> <span style="color: var(--success); font-weight: bold;">${qObj.o[qObj.a]}</span></p>` : ''}
                <div class="explanation"><div class="logic-section">Logic: ${qObj.logic}</div><div class="note-section"><strong>Learning Note:</strong> ${qObj.note}</div></div>
            </div>
        `;
    });

    const percentage = ((score / totalQ) * 100).toFixed(0);
    const displayName = loggedInUser.charAt(0).toUpperCase() + loggedInUser.slice(1);

    reportContainer.innerHTML = `
        <div class="report-header">
            <h2>Performance Report</h2>
            <h3 style="color: var(--text-light);">${data.title}</h3>
            <p>Student: <strong>${displayName}</strong> | Generated on: ${new Date().toLocaleDateString()}</p>
        </div>
        <div class="score-box"><p>TOTAL MARKS OBTAINED</p><h2>${score} / ${totalQ}</h2><p>Accuracy: ${percentage}%</p></div>
        <h3 style="margin-bottom: 20px; text-align: center; color: var(--primary-dark);">Detailed Review</h3>
        ${reviewHTML}
    `;
    
    window.scrollTo({ top: 0, behavior: 'smooth' });

    if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) MathJax.typesetPromise([reportContainer]).catch(err => console.log(err));
}

window.backToQuizzes = function() { loadQuiz(currentChapter); }

window.retakeQuiz = function() {
    if(!confirm(`Are you sure you want to erase your score and retake this quiz?`)) return;
    userAnswers[currentMode][currentLevel][currentChapter] = {};
    quizScores[currentMode][currentLevel][currentChapter] = null;
    saveState();
    loadQuiz(currentChapter);
}

window.exportPDF = function() {
    const element = document.getElementById('printable-report');
    const opt = {
        margin: [15, 15, 15, 15], filename: `Chemistry_Kinetics_Report_${loggedInUser}_${currentMode}_${currentLevel}.pdf`,
        image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }, pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
    };
    html2pdf().set(opt).from(element).save();
}

window.exportAllScores = function() {
    const tempDiv = document.createElement('div');
    tempDiv.style.padding = '30px'; tempDiv.style.fontFamily = 'sans-serif'; tempDiv.style.color = '#0f172a';
    const displayModeText = currentMode === 'cbse' ? 'CBSE Board Exam Focus' : 'Conceptual Focus';
    
    const getScoreText = (val, level, ch) => {
        if (val !== null) {
            const activeData = masterQuizData[currentMode][level][ch];
            const total = activeData && activeData.questions ? activeData.questions.length : 0;
            if(total === 0) return '<span style="color: #64748b;">No Questions Available</span>';
            const percentage = ((val / total) * 100).toFixed(0);
            return `<strong style="color: #10b981;">Marks: ${val} / ${total} &nbsp;&nbsp;|&nbsp;&nbsp; Percentage: ${percentage}%</strong>`;
        }
        return '<span style="color: #64748b;">Not Attempted</span>';
    };
    
    const displayName = loggedInUser.charAt(0).toUpperCase() + loggedInUser.slice(1);
    const buildLevelBlock = (levelName, levelKey, bgColor) => {
        let listHTML = `<li style="border-bottom: 1px solid #e2e8f0; padding: 10px 0;"><strong>Ch 3: Chemical Kinetics</strong> <br> <span style="display: block; margin-top: 5px;">${getScoreText(quizScores[currentMode][levelKey]['ch3'], levelKey, 'ch3')}</span></li>`;
        return `<div style="margin-bottom: 30px;"><h2 style="background: ${bgColor}; color: white; padding: 10px; border-radius: 6px;">${levelName} Scores</h2><ul style="list-style: none; padding: 0; font-size: 18px; line-height: 2;">${listHTML}</ul></div>`;
    };

    tempDiv.innerHTML = `
        <div style="text-align: center; margin-bottom: 40px;">
            <h1 style="color: #0284c7; font-size: 28px;">CBSE Chemistry - Score Report</h1>
            <p style="font-size: 16px; color: #475569;">Student: <strong>${displayName}</strong> | Mode: <strong>${displayModeText}</strong> | Generated on: ${new Date().toLocaleDateString()}</p>
        </div>
        ${buildLevelBlock('Easy Level', 'easy', '#10b981')}
        ${buildLevelBlock('Medium Level', 'medium', '#f59e0b')}
        ${buildLevelBlock('Hard Level', 'hard', '#ef4444')}
    `;

    const opt = {
        margin: 15, filename: `Chemistry_Kinetics_Master_Score_${loggedInUser}_${currentMode}.pdf`,
        image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) { MathJax.typesetPromise([tempDiv]).then(() => html2pdf().set(opt).from(tempDiv).save()); } 
    else { html2pdf().set(opt).from(tempDiv).save(); }
}

window.onload = initApp;
</script>
</body>
</html>
