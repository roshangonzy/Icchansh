<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBSE Class 12 Chemistry Learning Quiz</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --bg-color: #f0fdfa;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-light: #475569;
            --success: #10b981;
            --success-bg: #d1fae5;
            --danger: #ef4444;
            --danger-bg: #fee2e2;
            --border: #cbd5e1;
            --easy-color: #10b981;
            --medium-color: #f59e0b;
            --hard-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        /* --- Login Overlay Styles --- */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-card {
            background: var(--surface);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 6px solid var(--primary);
        }

        .login-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .login-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: opacity 0.2s;
        }

        .login-btn:hover { opacity: 0.9; }

        .error-msg {
            color: var(--danger);
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
            font-weight: bold;
        }
        
        .troubleshoot-btn {
            margin-top: 25px;
            background: none;
            border: none;
            color: var(--text-light);
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        
        .troubleshoot-btn:hover { color: var(--danger); }

        /* --- App Styles --- */
        #app-content { display: none; }

        .container { max-width: 900px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 25px;
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            position: relative;
            border-bottom: 4px solid var(--primary);
        }

        header h1 {
            color: var(--primary-dark);
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        .user-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
            font-size: 1.05rem;
            color: var(--text-light);
            font-weight: 600;
        }

        .logout-btn {
            padding: 5px 12px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .logout-btn:hover { background: #dc2626; }

        .export-all-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background-color: var(--text-main);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .export-all-btn:hover { opacity: 0.9; }

        @media (max-width: 600px) {
            .export-all-btn { position: static; display: block; width: 100%; margin-top: 15px; }
        }

        /* Level Tabs */
        .level-tabs { display: flex; gap: 15px; margin-bottom: 20px; justify-content: center; }

        .level-btn {
            padding: 10px 30px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--text-light);
            transition: all 0.2s;
        }

        .level-btn#btn-easy.active { background: var(--easy-color); color: white; border-color: var(--easy-color); }
        .level-btn#btn-medium.active { background: var(--medium-color); color: white; border-color: var(--medium-color); }
        .level-btn#btn-hard.active { background: var(--hard-color); color: white; border-color: var(--hard-color); }

        /* Mode Tabs */
        .mode-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            justify-content: center;
            background: #e2e8f0;
            padding: 8px;
            border-radius: 30px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .mode-btn {
            padding: 10px 25px;
            background: transparent;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.05rem;
            color: var(--text-light);
            transition: all 0.3s ease;
        }

        .mode-btn.active {
            background: var(--primary-dark);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Chapter Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            padding: 12px 24px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-light);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Score Badge on Tabs */
        .score-badge {
            background: #e2e8f0;
            color: var(--text-main);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .tab-btn.active .score-badge { background: white; color: var(--primary); }

        /* Main Content Area */
        .content-card {
            background: var(--surface);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            display: none;
        }

        .content-card.active { display: block; }

        /* Questions */
        .question-block { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); page-break-inside: avoid; }
        .question-block:last-child { border-bottom: none; }

        .question-text { font-size: 1.15rem; font-weight: 600; margin-bottom: 15px; color: var(--text-main); }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }

        .option-label {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            background: #f8fafc;
        }

        .option-label:hover:not(.locked) { background: #e2e8f0; }

        .option-label input[type="radio"] { margin-right: 15px; transform: scale(1.3); accent-color: var(--primary); }
        .option-label input[type="radio"]:disabled { cursor: not-allowed; }

        /* Locked Answer Styling */
        .option-label.locked { cursor: not-allowed; opacity: 0.85; }
        .option-label.correct-choice { background-color: var(--success-bg); border-color: var(--success); font-weight: 600; }
        .option-label.incorrect-choice { background-color: var(--danger-bg); border-color: var(--danger); opacity: 0.6; text-decoration: line-through; }

        /* Immediate Feedback Box */
        .feedback-box {
            margin-top: 15px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease-in;
            line-height: 1.6;
        }
        
        .feedback-box strong.title { display: block; margin-bottom: 8px; font-size: 1.1rem; }
        .feedback-box.correct { background-color: #f0fdf4; border: 1px solid var(--success); color: #065f46; }
        .feedback-box.incorrect { background-color: #fef2f2; border: 1px solid var(--danger); color: #991b1b; }

        .logic-section { margin-bottom: 10px; font-weight: 500; }
        .note-section { color: var(--text-main); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* Buttons */
        .btn { display: inline-block; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; text-align: center; color: white; }
        .btn:hover { opacity: 0.9; }
        .btn-primary { background-color: var(--primary); margin-top: 20px; }
        .btn-secondary { background-color: var(--text-light); margin-top: 10px; }
        .btn-dark { background-color: var(--text-main); margin-top: 10px; }
        .btn-danger { background-color: var(--danger); margin-top: 10px; }

        /* Report Styles */
        .report-header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid var(--border); }
        .score-box { background: var(--success-bg); border: 2px solid var(--success); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 30px; }
        .score-box h2 { color: var(--success); font-size: 2.5rem; margin: 10px 0; }
        .score-box p { color: #047857; font-weight: 600; font-size: 1.2rem; }

        .review-item { padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 6px solid; background: #f8fafc; page-break-inside: avoid; }
        .review-item.correct { border-left-color: var(--success); }
        .review-item.incorrect { border-left-color: var(--danger); }
        
        .review-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; margin-bottom: 10px; }
        .badge-correct { background: var(--success-bg); color: var(--success); }
        .badge-incorrect { background: var(--danger-bg); color: var(--danger); }

        .explanation { margin-top: 15px; padding: 15px; background: #e2e8f0; border-radius: 6px; font-size: 0.95rem; line-height: 1.6; }

        @media (min-width: 600px) { .options-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="color: var(--primary-dark); margin-bottom: 5px;">CBSE Chemistry Quiz</h2>
        <p style="color: var(--text-light); margin-bottom: 25px;">Please login to continue</p>
        
        <input type="text" id="username" class="login-input" placeholder="Username (e.g. icchansh)">
        <input type="password" id="password" class="login-input" placeholder="Password (1234)" onkeypress="handleEnter(event)">
        
        <button class="login-btn" onclick="handleLogin()">Login to Dashboard</button>
        <div id="login-error" class="error-msg">Invalid username or password.</div>
        
        <button class="troubleshoot-btn" onclick="clearAppData()">Clear Local Data (Troubleshooting)</button>
    </div>
</div>

<div id="app-content" class="container">
    <header>
        <h1>CBSE Class 12 Chemistry Quiz</h1>
        <p>Chapter 2: Electrochemistry</p>
        
        <div class="user-info">
            <span id="welcome-text"></span>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <button class="export-all-btn" onclick="exportAllScores()">📄 Export All Scores</button>
    </header>

    <div class="mode-tabs">
        <button class="mode-btn active" id="mode-conceptual" onclick="setMode('conceptual')">🧠 Conceptual Focus</button>
        <button class="mode-btn" id="mode-cbse" onclick="setMode('cbse')">📝 CBSE Board Focus</button>
    </div>

    <div class="level-tabs">
        <button class="level-btn active" id="btn-easy" onclick="setLevel('easy')">Easy Level</button>
        <button class="level-btn" id="btn-medium" onclick="setLevel('medium')">Medium Level</button>
        <button class="level-btn" id="btn-hard" onclick="setLevel('hard')">Hard Level</button>
    </div>

    <!-- TABS WILL BE INJECTED HERE DYNAMICALLY -->
    <div class="tabs" id="tabs-container"></div>

    <div id="quiz-view" class="content-card active">
        <h2 id="quiz-title" style="margin-bottom: 5px; border-bottom: 2px solid var(--border); padding-bottom: 10px;"></h2>
        <p id="cbse-legend" style="display: none; font-size: 0.95rem; color: var(--text-light); margin-bottom: 20px; font-weight: 600;">
            <span style="font-size: 1.1rem;">📜</span> Questions marked with this icon are derived from previous CBSE board exams (including numericals adapted to MCQs).
        </p>
        <div id="questions-container"></div>
        <div id="submit-container"></div>
    </div>

    <div id="report-view" class="content-card">
        <div id="printable-report"></div>
        <button class="btn btn-dark" onclick="exportPDF()">📄 Export Detailed Report as PDF</button>
        <button class="btn btn-primary" onclick="backToQuizzes()">↩ Back to Quizzes</button>
        <button class="btn btn-danger" onclick="retakeQuiz()">↻ Clear Points & Retake This Quiz</button>
    </div>
</div>

<script>
    // --- LOGIN ACCOUNTS ---
    const validAccounts = {
        'icchansh': '1234',
        'roshan': '1234'
    };

    // --- DYNAMIC DATA REGISTRY ---
    // Instead of hardcoding massive data blocks here, we will register them.
    const masterQuizData = {
        conceptual: { easy: {}, medium: {}, hard: {} },
        cbse: { easy: {}, medium: {}, hard: {} }
    };
    
    // Keeps track of the chapters we have loaded
    const registeredTopics = [];

    // This is the magic function that external topic files will call to inject themselves
    window.registerTopic = function(chapterId, tabLabel, conceptualDataObj, cbseDataObj) {
        registeredTopics.push({ id: chapterId, label: tabLabel });
        
        ['easy', 'medium', 'hard'].forEach(level => {
            masterQuizData.conceptual[level][chapterId] = conceptualDataObj[level];
            masterQuizData.cbse[level][chapterId] = cbseDataObj[level];
        });
    };

    // --- APPLICATION STATE (WITH LOCAL STORAGE) ---
    let currentMode = 'conceptual';
    let currentLevel = 'easy';
    let currentChapter = null; // Will be set during init
    let loggedInUser = localStorage.getItem('cbseChemistryUser') || null;
    let userAnswers = {};
    let quizScores = {};

    function initApp() {
        if (!loggedInUser) {
            document.getElementById('login-overlay').style.display = 'flex';
            document.getElementById('app-content').style.display = 'none';
            return;
        }

        // Hide login, show app
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        
        // Formatting name
        const displayName = loggedInUser.charAt(0).toUpperCase() + loggedInUser.slice(1);
        document.getElementById('welcome-text').innerText = `Welcome, ${displayName}`;

        // Load saved data specific to the logged-in user
        const savedAnswers = localStorage.getItem(`cbseChemistryAnswers_${loggedInUser}`);
        const savedScores = localStorage.getItem(`cbseChemistryScores_${loggedInUser}`);

        let parsedAnswers = savedAnswers ? JSON.parse(savedAnswers) : null;
        let parsedScores = savedScores ? JSON.parse(savedScores) : null;

        // Initialize state arrays
        if (parsedAnswers && parsedAnswers.conceptual) {
            userAnswers = parsedAnswers;
            quizScores = parsedScores;
        } else {
            userAnswers = { conceptual: { easy: {}, medium: {}, hard: {} }, cbse: { easy: {}, medium: {}, hard: {} } };
            quizScores = { conceptual: { easy: {}, medium: {}, hard: {} }, cbse: { easy: {}, medium: {}, hard: {} } };
        }

        // Ensure dynamic chapters exist in user state
        ['conceptual', 'cbse'].forEach(mode => {
            ['easy', 'medium', 'hard'].forEach(lvl => {
                registeredTopics.forEach(topic => {
                    if(!userAnswers[mode][lvl][topic.id]) userAnswers[mode][lvl][topic.id] = {};
                    if(quizScores[mode][lvl][topic.id] === undefined) quizScores[mode][lvl][topic.id] = null;
                });
            });
        });

        renderTabs();

        if (registeredTopics.length > 0) {
            loadQuiz(registeredTopics[0].id); // Load the very first registered topic by default
        } else {
            document.getElementById('quiz-title').innerText = "No topics loaded. Please add topic script files.";
            document.getElementById('submit-container').innerHTML = '';
        }
    }

    // Dynamic UI Builder for the Tabs
    function renderTabs() {
        const container = document.getElementById('tabs-container');
        container.innerHTML = ''; // Clear out any existing HTML
        
        registeredTopics.forEach((topic, index) => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
            btn.id = `tab-${topic.id}`;
            btn.onclick = () => loadQuiz(topic.id);
            btn.innerHTML = `${topic.label} <span id="badge-${topic.id}"></span>`;
            container.appendChild(btn);
        });
        
        updateTabScores();
    }

    // Helper to persist state to device storage
    function saveState() {
        if(!loggedInUser) return;
        localStorage.setItem(`cbseChemistryAnswers_${loggedInUser}`, JSON.stringify(userAnswers));
        localStorage.setItem(`cbseChemistryScores_${loggedInUser}`, JSON.stringify(quizScores));
    }
    
    // Feature to forcefully wipe old/broken local storage
    function clearAppData() {
        if (confirm("Are you sure you want to completely clear the local data? This will erase all scores and answers for all accounts on this device.")) {
            localStorage.clear();
            alert("Local storage wiped successfully. Reloading the app...");
            location.reload(true);
        }
    }

    // --- LOGIN / LOGOUT LOGIC ---
    function handleLogin() {
        const userField = document.getElementById('username').value.trim().toLowerCase();
        const passField = document.getElementById('password').value.trim();

        if (validAccounts[userField] && validAccounts[userField] === passField) {
            loggedInUser = userField;
            localStorage.setItem('cbseChemistryUser', loggedInUser);
            document.getElementById('login-error').style.display = 'none';
            initApp();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    function handleEnter(e) {
        if (e.key === 'Enter') {
            handleLogin();
        }
    }

    function handleLogout() {
        localStorage.removeItem('cbseChemistryUser');
        location.reload();
    }

    // --- QUIZ FUNCTIONS ---
    function setMode(mode) {
        currentMode = mode;
        
        // Update mode buttons
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`mode-${mode}`).classList.add('active');

        // Reload current chapter with new mode
        loadQuiz(currentChapter);
    }

    function setLevel(level) {
        currentLevel = level;
        
        // Update level buttons
        document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${level}`).classList.add('active');

        // Reload current chapter with new level
        loadQuiz(currentChapter);
    }

    // Dynamically updates scores on ALL rendered tabs
    function updateTabScores() {
        registeredTopics.forEach(topic => {
            const score = quizScores[currentMode][currentLevel][topic.id];
            const activeData = masterQuizData[currentMode][currentLevel][topic.id];
            const total = activeData ? activeData.questions.length : 0;
            
            const badgeElement = document.getElementById(`badge-${topic.id}`);
            if (badgeElement) {
                badgeElement.innerHTML = score !== null ? `<span class="score-badge">${score}/${total}</span>` : '';
            }
        });
    }

    function loadQuiz(chapterId) {
        currentChapter = chapterId;
        
        // Update Chapter Tabs Visually
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        const activeTab = document.getElementById(`tab-${chapterId}`);
        if(activeTab) activeTab.classList.add('active');
        
        updateTabScores();

        // Show quiz view, hide report view
        document.getElementById('quiz-view').classList.add('active');
        document.getElementById('report-view').classList.remove('active');

        // Toggle legend based on mode
        document.getElementById('cbse-legend').style.display = (currentMode === 'cbse') ? 'block' : 'none';

        const activeData = masterQuizData[currentMode][currentLevel][chapterId];
        if(!activeData) return;

        // Set Title
        document.getElementById('quiz-title').innerText = activeData.title;

        // Render Questions
        const container = document.getElementById('questions-container');
        container.innerHTML = '';

        activeData.questions.forEach((qObj, index) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question-block';
            
            // Check state to see if this was already answered previously
            const answeredOption = userAnswers[currentMode][currentLevel][chapterId][index];
            const isAnswered = answeredOption !== undefined;
            
            let optionsHTML = '';
            qObj.o.forEach((opt, optIndex) => {
                const isChecked = isAnswered && answeredOption === optIndex;
                let optionClasses = 'option-label ';
                
                // If the question is answered, apply styling classes
                if (isAnswered) {
                    optionClasses += 'locked ';
                    if (optIndex === qObj.a) {
                        optionClasses += 'correct-choice ';
                    } else if (isChecked) {
                        optionClasses += 'incorrect-choice ';
                    }
                }

                optionsHTML += `
                    <label class="${optionClasses}" id="label-${currentMode}-${currentLevel}-${chapterId}-${index}-${optIndex}">
                        <input type="radio" name="q-${currentMode}-${currentLevel}-${chapterId}-${index}" value="${optIndex}" 
                        ${isChecked ? 'checked' : ''}
                        ${isAnswered ? 'disabled' : ''}
                        onchange="selectAnswer('${chapterId}', ${index}, ${optIndex})">
                        ${opt}
                    </label>
                `;
            });

            // Set up the immediate feedback box if already answered
            let feedbackHTML = '';
            if (isAnswered) {
                const isCorrect = answeredOption === qObj.a;
                feedbackHTML = `
                    <div id="feedback-${currentMode}-${currentLevel}-${chapterId}-${index}" class="feedback-box ${isCorrect ? 'correct' : 'incorrect'}" style="display:block;">
                        <strong class="title">${isCorrect ? '✓ Correct!' : '✗ Incorrect.'}</strong>
                        <div class="logic-section">Logic: ${qObj.logic}</div>
                        <div class="note-section"><strong>Learning Note:</strong> ${qObj.note}</div>
                    </div>
                `;
            } else {
                feedbackHTML = `<div id="feedback-${currentMode}-${currentLevel}-${chapterId}-${index}" class="feedback-box"></div>`;
            }

            qDiv.innerHTML = `
                <div class="question-text">${index + 1}. ${qObj.q}</div>
                <div class="options-grid">${optionsHTML}</div>
                ${feedbackHTML}
            `;
            container.appendChild(qDiv);
        });

        // Setup Submit/View Report Button Logic
        const submitContainer = document.getElementById('submit-container');
        const totalQ = activeData.questions.length;

        if (quizScores[currentMode][currentLevel][chapterId] !== null) {
            submitContainer.innerHTML = `<button class="btn btn-primary" onclick="showReport()">📊 View Report (Score: ${quizScores[currentMode][currentLevel][chapterId]}/${totalQ})</button>`;
        } else {
            submitContainer.innerHTML = `<button class="btn btn-primary" onclick="submitQuiz()">Submit & Get Final Report</button>`;
        }
        
        window.scrollTo({ top: 0, behavior: 'smooth' });

        // Typeset MathJax for newly injected elements
        if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
            MathJax.typesetPromise([container, document.getElementById('quiz-title')]).catch(err => console.log(err));
        }
    }

    // Handles user selecting an answer visually and in state
    window.selectAnswer = function(chapterId, qIndex, optIndex) {
        // LOCK IN ANSWER: Check if already answered
        if (userAnswers[currentMode][currentLevel][chapterId][qIndex] !== undefined) return;

        // Save answer to state
        userAnswers[currentMode][currentLevel][chapterId][qIndex] = optIndex;
        saveState(); // Update local storage
        
        const qObj = masterQuizData[currentMode][currentLevel][chapterId].questions[qIndex];
        const isCorrect = optIndex === qObj.a;
        
        // Visual update - Lock the options and show correct/incorrect colors
        for(let i=0; i<4; i++) {
            const label = document.getElementById(`label-${currentMode}-${currentLevel}-${chapterId}-${qIndex}-${i}`);
            const input = label.querySelector('input');
            
            if (label && input) {
                label.classList.add('locked');
                input.disabled = true; // Disable all inputs for this question
                
                if (i === qObj.a) {
                    label.classList.add('correct-choice'); // Highlight the real answer
                } else if (i === optIndex) {
                    label.classList.add('incorrect-choice'); // Strike-through wrong guess
                }
            }
        }
        
        // Show immediate feedback note with justification
        const feedbackBox = document.getElementById(`feedback-${currentMode}-${currentLevel}-${chapterId}-${qIndex}`);
        feedbackBox.className = `feedback-box ${isCorrect ? 'correct' : 'incorrect'}`;
        feedbackBox.innerHTML = `
            <strong class="title">${isCorrect ? '✓ Correct!' : '✗ Incorrect.'}</strong>
            <div class="logic-section">Logic: ${qObj.logic}</div>
            <div class="note-section"><strong>Learning Note:</strong> ${qObj.note}</div>
        `;
        feedbackBox.style.display = 'block';

        if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
            MathJax.typesetPromise([feedbackBox]).catch(err => console.log(err));
        }
    }

    window.submitQuiz = function() {
        const activeData = masterQuizData[currentMode][currentLevel][currentChapter];
        const totalQ = activeData.questions.length;
        const answeredQ = Object.keys(userAnswers[currentMode][currentLevel][currentChapter]).length;

        if (answeredQ < totalQ) {
            const confirmSubmit = confirm(`You have only answered ${answeredQ} out of ${totalQ} questions. Unanswered questions will be marked wrong. Do you want to submit anyway?`);
            if(!confirmSubmit) return;
        }

        // Calculate and save score persistently
        let score = 0;
        activeData.questions.forEach((qObj, index) => {
            if (userAnswers[currentMode][currentLevel][currentChapter][index] === qObj.a) {
                score++;
            }
        });
        
        quizScores[currentMode][currentLevel][currentChapter] = score;
        saveState(); // Update local storage
        
        updateTabScores();
        showReport();
    }

    window.showReport = function() {
        const data = masterQuizData[currentMode][currentLevel][currentChapter];
        const score = quizScores[currentMode][currentLevel][currentChapter];
        const totalQ = data.questions.length;

        // Hide quiz, show report
        document.getElementById('quiz-view').classList.remove('active');
        document.getElementById('report-view').classList.add('active');
        
        const reportContainer = document.getElementById('printable-report');
        let reviewHTML = '';

        data.questions.forEach((qObj, index) => {
            const userAns = userAnswers[currentMode][currentLevel][currentChapter][index];
            const isAnswered = userAns !== undefined;
            const isCorrect = isAnswered && (userAns === qObj.a);

            const badgeClass = isCorrect ? 'badge-correct' : 'badge-incorrect';
            const badgeText = isCorrect ? '✓ Correct' : '✗ Incorrect';
            const userAnswerText = isAnswered ? qObj.o[userAns] : 'Not Answered';

            reviewHTML += `
                <div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                    <span class="review-badge ${badgeClass}">${badgeText}</span>
                    <div class="question-text">${index + 1}. ${qObj.q}</div>
                    
                    <p style="margin-bottom: 5px;"><strong>Your Answer:</strong> 
                        <span style="color: ${isCorrect ? 'var(--success)' : 'var(--danger)'}">${userAnswerText}</span>
                    </p>
                    
                    ${!isCorrect ? `<p style="margin-bottom: 5px;"><strong>Correct Answer:</strong> <span style="color: var(--success); font-weight: bold;">${qObj.o[qObj.a]}</span></p>` : ''}
                    
                    <div class="explanation">
                        <div class="logic-section">Logic: ${qObj.logic}</div>
                        <div class="note-section"><strong>Learning Note:</strong> ${qObj.note}</div>
                    </div>
                </div>
            `;
        });

        const percentage = ((score / totalQ) * 100).toFixed(0);
        const dateString = new Date().toLocaleDateString();
        const displayName = loggedInUser.charAt(0).toUpperCase() + loggedInUser.slice(1);

        reportContainer.innerHTML = `
            <div class="report-header">
                <h2>Performance Report</h2>
                <h3 style="color: var(--text-light);">${data.title}</h3>
                <p>Student: <strong>${displayName}</strong> | Generated on: ${dateString}</p>
            </div>
            
            <div class="score-box">
                <p>TOTAL MARKS OBTAINED</p>
                <h2>${score} / ${totalQ}</h2>
                <p>Accuracy: ${percentage}%</p>
            </div>

            <h3 style="margin-bottom: 20px; text-align: center; color: var(--primary-dark);">Detailed Review</h3>
            ${reviewHTML}
        `;
        
        window.scrollTo({ top: 0, behavior: 'smooth' });

        if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
            MathJax.typesetPromise([reportContainer]).catch(err => console.log(err));
        }
    }

    window.backToQuizzes = function() {
        // Navigate back WITHOUT clearing answers
        loadQuiz(currentChapter);
    }
    
    window.retakeQuiz = function() {
        // Explicitly clear answers for retake
        const confirmRetake = confirm(`Are you sure you want to erase your score and retake this quiz?`);
        if(!confirmRetake) return;
        
        userAnswers[currentMode][currentLevel][currentChapter] = {};
        quizScores[currentMode][currentLevel][currentChapter] = null;
        saveState(); // Update local storage
        
        loadQuiz(currentChapter);
    }

    window.exportPDF = function() {
        const element = document.getElementById('printable-report');
        const filename = `Chemistry_Report_${loggedInUser}_${currentMode}_${currentLevel}_${currentChapter}.pdf`;
        
        // Configure PDF options
        const opt = {
            margin:       [15, 15, 15, 15],
            filename:     filename,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] }
        };

        // Generate and save
        html2pdf().set(opt).from(element).save();
    }

    window.exportAllScores = function() {
        // Create a temporary container for the master report
        const tempDiv = document.createElement('div');
        tempDiv.style.padding = '30px';
        tempDiv.style.fontFamily = 'sans-serif';
        tempDiv.style.color = '#0f172a';
        
        const displayModeText = currentMode === 'cbse' ? 'CBSE Board Exam Focus' : 'Conceptual Focus';
        
        // Formatter perfectly restricted to Marks & Percentage only.
        const getScoreText = (val, level, ch) => {
            if (val !== null) {
                const activeData = masterQuizData[currentMode][level][ch];
                const total = activeData ? activeData.questions.length : 0;
                if(total === 0) return '<span style="color: #64748b;">No Questions Available</span>';
                const percentage = ((val / total) * 100).toFixed(0);
                return `<strong style="color: #10b981;">Marks: ${val} / ${total} &nbsp;&nbsp;|&nbsp;&nbsp; Percentage: ${percentage}%</strong>`;
            }
            return '<span style="color: #64748b;">Not Attempted</span>';
        };
        
        const displayName = loggedInUser.charAt(0).toUpperCase() + loggedInUser.slice(1);

        // Dynamically build the PDF blocks based strictly on registered topics
        const buildLevelBlock = (levelName, levelKey, bgColor) => {
            let listHTML = '';
            registeredTopics.forEach(topic => {
                listHTML += `<li style="border-bottom: 1px solid #e2e8f0; padding: 10px 0;"><strong>${topic.label}</strong> <br> <span style="display: block; margin-top: 5px;">${getScoreText(quizScores[currentMode][levelKey][topic.id], levelKey, topic.id)}</span></li>`;
            });
            return `
                <div style="margin-bottom: 30px;">
                    <h2 style="background: ${bgColor}; color: white; padding: 10px; border-radius: 6px;">${levelName} Scores</h2>
                    <ul style="list-style: none; padding: 0; font-size: 18px; line-height: 2;">
                        ${listHTML}
                    </ul>
                </div>
            `;
        };

        tempDiv.innerHTML = `
            <div style="text-align: center; margin-bottom: 40px;">
                <h1 style="color: #0284c7; font-size: 28px;">CBSE Chemistry - Score Report</h1>
                <p style="font-size: 16px; color: #475569;">Student: <strong>${displayName}</strong> | Mode: <strong>${displayModeText}</strong> | Generated on: ${new Date().toLocaleDateString()}</p>
            </div>
            ${buildLevelBlock('Easy Level', 'easy', '#10b981')}
            ${buildLevelBlock('Medium Level', 'medium', '#f59e0b')}
            ${buildLevelBlock('Hard Level', 'hard', '#ef4444')}
        `;

        const opt = {
            margin:       15,
            filename:     `Chemistry_Master_Score_Report_${loggedInUser}_${currentMode}.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2 },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
            MathJax.typesetPromise([tempDiv]).then(() => html2pdf().set(opt).from(tempDiv).save());
        } else {
            html2pdf().set(opt).from(tempDiv).save();
        }
    }

</script>
